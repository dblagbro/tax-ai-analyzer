

<section class="section" id="txn-add">
  <h2 class="section-heading">Adding Transactions Manually</h2>
  <ol class="step-list">
    <li>In the Transactions tab, click <strong>+ Add Transaction</strong>.</li>
    <li>Fill in: Date, Description, Amount (positive for income, negative for expense), Category, Entity, Tax Year.</li>
    <li>Optionally add a Vendor, Notes, and Source tag.</li>
    <li>Click <strong>Save</strong>.</li>
  </ol>
</section>
