<script>
const P = '{{ url_prefix }}';
let curSess = null;
var _myUserId = {{ current_user.id if current_user.is_authenticated else 0 }};
var _isAdmin = {{ 'true' if current_user.is_authenticated and current_user.is_admin else 'false' }};

document.addEventListener('DOMContentLoaded', () => {
  const t = '{{ active_tab or "dashboard" }}';
  loadTab(t);
  document.getElementById('uToggle').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('uMenu').classList.toggle('open');
  });
  document.addEventListener('click', () => document.getElementById('uMenu').classList.remove('open'));
  // Start health polling
  refreshHealth();
  setInterval(refreshHealth, 30000);
});

/* ---- Status light / health polling ---- */
async function refreshHealth() {
  try {
    const data = await fetch(P+'/api/health').then(r=>r.json()).catch(()=>null);
    if (!data) return;
    const names = ['tax-ai-analyzer','tax-paperless-web','tax-paperless-redis','tax-paperless-postgres','elasticsearch'];
    names.forEach(name => {
      const dot = document.getElementById('sd-'+name);
      const tip = document.getElementById('sdt-'+name);
      if (!dot || !tip) return;
      const info = data[name] || {status:'unknown'};
      dot.className = 'status-dot ' + (info.status === 'ok' ? 'ok' : info.status === 'warn' ? 'warn' : 'error');
      tip.textContent = name + ': ' + (info.message || info.status || 'unknown');
    });
  } catch(e) {}
}

/* ---- Password eye toggle ---- */
function togglePw(inputId, eyeEl) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  if (inp.type === 'password') { inp.type = 'text'; eyeEl.style.opacity = '1'; }
  else { inp.type = 'password'; eyeEl.style.opacity = '.45'; }
}

/* ---- Model dropdown ---- */
let _llmModels = {};
async function loadLlmModels() {
  try { _llmModels = await fetch(P+'/api/settings/llm-models').then(r=>r.json()); } catch(e) {}
  updateModelDropdown();
}
function updateModelDropdown(currentVal) {
  const prov = document.getElementById('s-prov')?.value || 'anthropic';
  const sel = document.getElementById('s-model');
  if (!sel) return;
  const prev = currentVal || sel.value;
  const models = _llmModels[prov] || [];
  sel.innerHTML = models.map(m=>`<option value="${m}"${m===prev?' selected':''}>${m}</option>`).join('');
  if (!sel.value && models.length) sel.value = models[0];
}

/* ---- Job Log Modal ---- */
let _jobLogTimer = null, _jobLogJobId = null, _jobLogOffset = 0;
function openJobLog(jobId, sourceType) {
  _jobLogJobId = jobId;
  _jobLogOffset = 0;
  const title = document.getElementById('jobLogTitle');
  const lines = document.getElementById('jobLogLines');
  const statusEl = document.getElementById('jobLogStatus');
  const metaEl = document.getElementById('jobLogMeta');
  const cancelBtn = document.getElementById('jobLogCancelBtn');
  if (title) title.textContent = 'Job #'+jobId+' — '+(sourceType||'');
  if (lines) lines.textContent = '';
  if (statusEl) { statusEl.textContent = 'running'; statusEl.className = 'badge badge-running'; }
  if (metaEl) metaEl.textContent = 'Fetching logs…';
  if (cancelBtn) cancelBtn.style.display = 'none';
  document.getElementById('mJobLog').classList.add('open');
  if (_jobLogTimer) clearInterval(_jobLogTimer);
  _pollJobLog();
  _jobLogTimer = setInterval(_pollJobLog, 2000);
}
async function _pollJobLog() {
  if (!_jobLogJobId) return;
  const data = await fetch(P+'/api/import/jobs/'+_jobLogJobId+'/logs?offset='+_jobLogOffset).then(r=>r.json()).catch(()=>null);
  const lines = document.getElementById('jobLogLines');
  if (data?.lines?.length && lines) {
    data.lines.forEach(l => { lines.textContent += l + '\n'; });
    _jobLogOffset = data.total;
    lines.scrollTop = lines.scrollHeight;
  }
  const job = await fetch(P+'/api/import/jobs/'+_jobLogJobId).then(r=>r.json()).catch(()=>null);
  if (!job) return;
  const statusEl = document.getElementById('jobLogStatus');
  const metaEl = document.getElementById('jobLogMeta');
  const cancelBtn = document.getElementById('jobLogCancelBtn');
  const isRunning = ['running','pending','cancelling'].includes(job.status);
  if (statusEl) { statusEl.textContent = job.status; statusEl.className = 'badge badge-'+job.status; }
  if (metaEl) metaEl.textContent = 'Imported: '+(job.count_imported??0)+' | Skipped: '+(job.count_skipped??0)+(job.error_msg?' | Error: '+job.error_msg.slice(0,60):'');
  if (cancelBtn) cancelBtn.style.display = (isRunning && _isAdmin) ? 'inline-flex' : 'none';
  if (!isRunning && _jobLogTimer) { clearInterval(_jobLogTimer); _jobLogTimer = null; }
  // Show fallback summary if no logs available (orphaned job or old job after restart)
  if (lines && !lines.textContent.trim() && data?.total === 0) {
    const isOrphaned = isRunning; // running but no logs = orphaned from prev container
    lines.textContent = isOrphaned
      ? '[Job was running in a previous container instance — logs not available]\n'
      : '[No log data available for this job]\n';
    lines.textContent += '─────────────────────────────────\n';
    lines.textContent += 'Status:    '+job.status+'\n';
    lines.textContent += 'Imported:  '+(job.count_imported??0)+'\n';
    lines.textContent += 'Skipped:   '+(job.count_skipped??0)+'\n';
    lines.textContent += 'Started:   '+(job.started_at||'?')+'\n';
    if (job.completed_at) lines.textContent += 'Completed: '+job.completed_at+'\n';
    if (job.error_msg) lines.textContent += 'Error:     '+job.error_msg+'\n';
    if (isOrphaned) lines.textContent += '\nTip: Click Cancel to mark this job as cancelled,\nthen start a new import — dedup will skip already-processed emails.\n';
  }
}
function closeJobLog() {
  if (_jobLogTimer) { clearInterval(_jobLogTimer); _jobLogTimer = null; }
  document.getElementById('mJobLog').classList.remove('open');
}
async function cancelJobFromLog() {
  if (!_jobLogJobId) return;
  if (!confirm('Cancel job #'+_jobLogJobId+'?')) return;
  const r = await post('/api/import/jobs/'+_jobLogJobId+'/cancel',{});
  toast(r.status==='cancelling'?'Cancelling…':'Not running.','info');
}

function sw(t) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-'+t)?.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.getAttribute('onclick') && n.getAttribute('onclick').includes("'"+t+"'")) n.classList.add('active');
  });
  loadTab(t);
  const urlSlug = {tax_review:'tax-review', folder_manager:'folder-manager', ai_costs:'ai-costs'}[t] || t;
  history.replaceState(null,'', P + (t==='dashboard' ? '/' : '/'+urlSlug));
}

function loadTab(t) {
  const m = {dashboard:()=>{loadStats();loadAct();loadRecentJobs();loadFiledReturns();},transactions:loadTxns,documents:docReload,
    import:()=>{loadJobs();loadGmailImportStatus();loadUsaStatus();startJobRefresh();},
    tax_review:()=>{loadTaxReviewYears();},
    mileage:loadMileage,
    activity:loadActivity,
    ai_costs:loadAiCosts,
    folder_manager:foLoadMigration,
    chat:loadSessions,reports:loadExports,settings:loadSettings,users:loadUsers};
  if(t!=='import') stopJobRefresh();
  m[t]?.();
}

function applyGlobal() {
  const year = document.getElementById('g-year')?.value || '';
  const entity = document.getElementById('g-entity')?.value || '';
  // Sync per-tab dropdowns to global selection
  const map = [['tf-year','tf-entity'],['df-year','df-entity']];
  map.forEach(([yId, eId]) => {
    const yEl = document.getElementById(yId);
    const eEl = document.getElementById(eId);
    if (yEl && year) yEl.value = year;
    if (eEl && entity) eEl.value = entity;
  });
  loadStats();
  // Also reload whichever data tab is active
  const activePanel = document.querySelector('.tab-panel.active');
  if (activePanel) {
    if (activePanel.id === 'tab-transactions') loadTxns();
    else if (activePanel.id === 'tab-documents') loadDocs();
  }
}

/* Stats */
async function loadStats() {
  const year = document.getElementById('g-year')?.value || '';
  const entity = document.getElementById('g-entity')?.value || '';
  const p = new URLSearchParams();
  if (year) p.set('year', year);
  if (entity) p.set('entity_id', entity);
  const r = await fetch(P+'/api/stats'+(p.toString()?'?'+p:'')).then(r=>r.json()).catch(()=>({}));
  document.getElementById('s-docs').textContent = r.total_docs ?? 0;
  document.getElementById('s-income').textContent = '$'+fmt(r.total_income);
  document.getElementById('s-expenses').textContent = '$'+fmt(r.total_expenses);
  const n = r.net ?? 0;
  const el = document.getElementById('s-net');
  el.textContent = (n<0?'-$':'$')+fmt(Math.abs(n));
  el.className = 'stat-num '+(n>=0?'pos':'neg');

  // Audit-risk card: in-parallel fetch, degrades gracefully
  fetch(P+'/api/transactions/audit-risk'+(p.toString()?'?'+p:'')).then(r=>r.json()).then(ar => {
    const rel = document.getElementById('s-audit-risk');
    if (rel) rel.textContent = (ar.count ?? 0).toString();
  }).catch(() => {});
  const g = document.getElementById('entityGrid');
  const ents = Object.entries(r.by_entity||{});
  g.innerHTML = ents.length ? ents.map(([sl,e])=>`<div class="entity-card" style="border-left-color:${e.color||'#1a3c5e'};cursor:pointer" title="Filter by ${e.name||sl}" onclick="jumpToEntity(${e.id})" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
    <div class="entity-name">${e.name||sl} <span style="font-size:.7rem;color:#888;font-weight:400">&#8594; filter</span></div>
    <div class="entity-stats">
      <div class="entity-stat" onclick="event.stopPropagation();jumpToTxnsEntity('income',${e.id})" style="cursor:pointer" title="View income"><div class="val pos">$${fmt(e.income)}</div><div class="lbl">Income &#8599;</div></div>
      <div class="entity-stat" onclick="event.stopPropagation();jumpToTxnsEntity('expense',${e.id})" style="cursor:pointer" title="View expenses"><div class="val neg">$${fmt(e.expenses)}</div><div class="lbl">Expenses &#8600;</div></div>
      <div class="entity-stat" onclick="event.stopPropagation();jumpToDocs(${e.id})" style="cursor:pointer" title="View documents"><div class="val">${e.doc_count}</div><div class="lbl">Docs &#8594;</div></div>
      <div class="entity-stat"><div class="val ${e.net>=0?'pos':'neg'}">${e.net<0?'-':''}$${fmt(Math.abs(e.net))}</div><div class="lbl">Net Income/Loss</div></div>
    </div></div>`).join('') : '<div class="empty">No entity data yet. Import documents or transactions.</div>';
}

async function loadAct() {
  const rows = await fetch(P+'/api/activity?limit=30').then(r=>r.json()).catch(()=>[]);
  const el = document.getElementById('actList');
  el.innerHTML = rows.length ? rows.map(a=>`<div class="act-item"><span class="act-ts">${(a.created_at||'').slice(0,16).replace('T',' ')}</span><span>${esc(a.action)}: ${esc(a.detail||'')}</span></div>`).join('') : '<div class="empty">No activity yet.</div>';
}

async function loadRecentJobs() {
  const jobs = await fetch(P+'/api/import/jobs').then(r=>r.json()).catch(()=>[]);
  const el = document.getElementById('recentJobs');
  el.innerHTML = jobs.length ? jobs.slice(0,8).map(j=>`<div class="job-item">
    <span class="job-src">${j.source_type||''}</span>
    <span><span class="badge badge-${j.status||'pending'}">${j.status||'pending'}</span></span>
    <span style="flex:1;color:var(--muted);font-size:.82rem">${esc(j.error_msg||'')} ${j.count_imported!=null?j.count_imported+' imported':''}</span>
    <span style="font-size:.72rem;color:var(--muted)">${(j.created_at||'').slice(0,16).replace('T',' ')}</span>
  </div>`).join('') : '<div class="empty">No imports yet.</div>';
}

/* Navigation helpers — jump to filtered views from dashboard cards */
function jumpToTxns(cat) {
  const catEl = document.getElementById('tf-cat');
  if (catEl) catEl.value = cat;
  const subMap = {income:'txn-sub-income', expense:'txn-sub-expense', deduction:'txn-sub-deduction', '':'txn-sub-all'};
  document.querySelectorAll('.imp-tab[id^="txn-sub-"]').forEach(b=>b.classList.remove('active'));
  const targetBtn = document.getElementById(subMap[cat]||'txn-sub-all');
  if (targetBtn) targetBtn.classList.add('active');
  sw('transactions');
}
function jumpToTxnsEntity(cat, entityId) {
  const eEl = document.getElementById('tf-entity');
  if (eEl) eEl.value = entityId;
  const gEl = document.getElementById('g-entity');
  if (gEl) gEl.value = entityId;
  jumpToTxns(cat);
}
function jumpToEntity(entityId) {
  const gEl = document.getElementById('g-entity');
  if (gEl) { gEl.value = entityId; applyGlobal(); }
  sw('transactions');
}
function jumpToAuditRisk() {
  // Switch to transactions tab, Unmatched sub-tab, load reconcile view
  sw('transactions');
  setTimeout(() => {
    const btn = document.getElementById('txn-sub-unmatched');
    if (btn) showReconcile(btn);
  }, 50);
}
function jumpToDocs(entityId) {
  const gEl = document.getElementById('g-entity');
  if (gEl) { gEl.value = entityId; applyGlobal(); }
  sw('documents');
}
function txnSubTab(cat, btn) {
  document.querySelectorAll('.imp-tab[id^="txn-sub-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const catEl = document.getElementById('tf-cat');
  if (catEl) catEl.value = cat;
  _txnTM = null;
  // Swap panels: hide reconcile+vendors, show main txn table
  document.getElementById('txn-reconcile-view').style.display = 'none';
  document.getElementById('txn-vendors-view').style.display = 'none';
  document.getElementById('txn-main-card').style.display = '';
  const bulkBar = document.getElementById('txn-bulk-bar');
  loadTxns();
}

// Dispatch filter changes to whichever view is active
function refreshTxnView() {
  const recon = document.getElementById('txn-reconcile-view');
  if (recon && recon.style.display !== 'none') {
    loadReconcile();
  } else {
    loadTxns();
  }
}

// Unmatched / reconciliation view
let _reconSelectedTxn = null;
let _reconSelectedDoc = null;

async function showReconcile(btn) {
  document.querySelectorAll('.imp-tab[id^="txn-sub-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('txn-reconcile-view').style.display = '';
  document.getElementById('txn-vendors-view').style.display = 'none';
  document.getElementById('txn-main-card').style.display = 'none';
  await loadReconcile();
}

async function showVendors(btn) {
  document.querySelectorAll('.imp-tab[id^="txn-sub-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('txn-reconcile-view').style.display = 'none';
  document.getElementById('txn-vendors-view').style.display = '';
  document.getElementById('txn-main-card').style.display = 'none';
  await loadVendors();
}

async function loadReconcile() {
  _reconSelectedTxn = null;
  _reconSelectedDoc = null;
  document.getElementById('recon-link-btn').disabled = true;
  document.getElementById('recon-link-status').textContent = '';

  const p = new URLSearchParams({limit:500});
  const e=document.getElementById('tf-entity')?.value; if(e) p.set('entity_id',e);
  const y=document.getElementById('tf-year')?.value; if(y) p.set('year',y);

  // Audit-risk query uses same entity/year but own threshold
  const threshold = parseFloat(document.getElementById('audit-threshold')?.value) || 75;
  const auditParams = new URLSearchParams();
  if (e) auditParams.set('entity_id', e);
  if (y) auditParams.set('year', y);
  auditParams.set('threshold', threshold);

  const [txnResp, docResp, auditResp] = await Promise.all([
    fetch(P+'/api/transactions/unmatched?'+p).then(r=>r.json()).catch(()=>({transactions:[]})),
    fetch(P+'/api/documents/unmatched?'+p).then(r=>r.json()).catch(()=>({documents:[]})),
    fetch(P+'/api/transactions/audit-risk?'+auditParams).then(r=>r.json()).catch(()=>({count:0,total_amount:0})),
  ]);

  // Populate audit-risk card
  document.getElementById('audit-threshold-label').textContent = Math.round(auditResp.threshold || threshold);
  document.getElementById('audit-count').textContent = (auditResp.count ?? 0).toLocaleString();
  document.getElementById('audit-total').textContent = '$' + (auditResp.total_amount || 0).toLocaleString(undefined, {maximumFractionDigits:0});
  const txns = txnResp.transactions || [];
  const docs = docResp.documents || [];

  document.getElementById('recon-txn-count').textContent = txns.length;
  document.getElementById('recon-doc-count').textContent = docs.length;

  const txnBody = document.getElementById('recon-txn-body');
  txnBody.innerHTML = txns.length ? txns.map(t=>{
    const absAmt = Math.abs(t.amount||0);
    const amt = absAmt.toFixed(2);
    const isExpenseish = (t.category||'').toLowerCase() === 'expense' || (t.category||'').toLowerCase() === 'deduction';
    const isAuditRisk = isExpenseish && absAmt >= threshold;
    const riskFlag = isAuditRisk ? '<span title="IRS audit risk — receipt required for business expenses ≥ $'+threshold+'" style="color:#c0621c;margin-right:4px;font-weight:700">&#9888;</span>' : '';
    return `<tr data-id="${t.id}" style="cursor:pointer${isAuditRisk?';background:#fffaf0':''}" onclick="selectReconTxn(${t.id},this)">
      <td style="white-space:nowrap">${riskFlag}${esc((t.date||'').slice(0,10))}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(t.vendor||'')}">${esc(t.vendor||'')}</td>
      <td style="text-align:right;font-weight:600" class="${(t.amount||0)>=0?'pos':'neg'}">$${amt}</td>
      <td style="font-size:.72rem;color:var(--muted)">${esc(t.source||'')}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted)">&#10003; No unmatched transactions!</td></tr>`;

  const docBody = document.getElementById('recon-doc-body');
  docBody.innerHTML = docs.length ? docs.map(d=>{
    const amt = Math.abs(d.amount||0).toFixed(2);
    const purl = (typeof PAPERLESS_WEB_URL !== 'undefined' && PAPERLESS_WEB_URL && d.paperless_doc_id)
      ? `<a href="${PAPERLESS_WEB_URL}/documents/${d.paperless_doc_id}/preview/" target="_blank" onclick="event.stopPropagation()" style="color:#1a3c5e">&#128196;</a>` : '';
    return `<tr data-id="${d.id}" style="cursor:pointer" onclick="selectReconDoc(${d.id},this)">
      <td style="white-space:nowrap">${esc((d.date||'').slice(0,10))}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(d.vendor||'')}">${esc(d.vendor||'')}</td>
      <td style="text-align:right;font-weight:600">$${amt}</td>
      <td>${purl}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted)">&#10003; No orphan documents!</td></tr>`;
}

function selectReconTxn(id, row) {
  _reconSelectedTxn = id;
  document.querySelectorAll('#recon-txn-body tr').forEach(r => r.style.background = '');
  row.style.background = '#fff4e6';
  document.getElementById('recon-link-btn').disabled = !(_reconSelectedTxn && _reconSelectedDoc);
}

function selectReconDoc(id, row) {
  _reconSelectedDoc = id;
  document.querySelectorAll('#recon-doc-body tr').forEach(r => r.style.background = '');
  row.style.background = '#f0e7ff';
  document.getElementById('recon-link-btn').disabled = !(_reconSelectedTxn && _reconSelectedDoc);
}

function updateAuditThreshold() {
  // Only refresh if reconcile view is active (fast — single fetch)
  if (document.getElementById('txn-reconcile-view')?.style.display !== 'none') {
    loadReconcile();
  }
}

async function manualLinkSelected() {
  if (!_reconSelectedTxn || !_reconSelectedDoc) return;
  const status = document.getElementById('recon-link-status');
  status.innerHTML = '<span style="color:var(--muted)">Linking…</span>';
  const r = await post('/api/transactions/links/manual',
                       {txn_id: _reconSelectedTxn, doc_id: _reconSelectedDoc});
  if (r.status === 'created' || r.status === 'updated') {
    status.innerHTML = `<span style="color:#28a745">&#10003; Linked (${r.status})</span>`;
    toast('Link saved', 'success');
    await loadReconcile();  // refresh both sides
  } else {
    status.innerHTML = `<span style="color:#d32f2f">&#10007; ${esc(r.error||'Link failed')}</span>`;
  }
}

/* Transactions */
let _txnTM = null;

// Bulk selection state
const _bulkSelection = new Set();

function toggleTxnRow(id, cb) {
  if (cb.checked) _bulkSelection.add(id); else _bulkSelection.delete(id);
  updateBulkBar();
}

function toggleAllTxns(cb) {
  const visibleCbs = document.querySelectorAll('.txn-row-check');
  visibleCbs.forEach(rc => {
    rc.checked = cb.checked;
    const id = parseInt(rc.dataset.id);
    if (cb.checked) _bulkSelection.add(id); else _bulkSelection.delete(id);
  });
  updateBulkBar();
}

function clearBulkSelection() {
  _bulkSelection.clear();
  document.querySelectorAll('.txn-row-check').forEach(rc => rc.checked = false);
  const sa = document.getElementById('txn-select-all');
  if (sa) sa.checked = false;
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('txn-bulk-bar');
  if (!bar) return;
  const n = _bulkSelection.size;
  bar.style.display = n > 0 ? '' : 'none';
  const countEl = document.getElementById('txn-bulk-count');
  if (countEl) countEl.textContent = n;
}

async function applyBulkUpdate() {
  const n = _bulkSelection.size;
  if (!n) return;
  const changes = {};
  const cat = document.getElementById('bulk-category').value;
  const eid = document.getElementById('bulk-entity').value;
  const yr  = document.getElementById('bulk-year').value;
  const dt  = document.getElementById('bulk-doctype').value.trim();
  if (cat) changes.category = cat;
  if (eid !== '') changes.entity_id = eid === '_clear' ? null : parseInt(eid);
  if (yr) changes.tax_year = yr;
  if (dt) changes.doc_type = dt;
  if (!Object.keys(changes).length) { alert('Pick at least one field to change.'); return; }
  if (!confirm(`Apply changes to ${n} transaction${n===1?'':'s'}?\n${JSON.stringify(changes,null,2)}`)) return;
  const r = await post('/api/transactions/bulk', {
    action: 'update',
    ids: Array.from(_bulkSelection),
    changes: changes,
  });
  if (r.status === 'updated') {
    toast(`Updated ${r.count} transaction${r.count===1?'':'s'}`, 'success');
    clearBulkSelection();
    // Reset inputs
    document.getElementById('bulk-category').value = '';
    document.getElementById('bulk-entity').value = '';
    document.getElementById('bulk-year').value = '';
    document.getElementById('bulk-doctype').value = '';
    loadTxns();
  } else {
    alert(r.error || 'Bulk update failed');
  }
}

async function applyBulkDelete() {
  const n = _bulkSelection.size;
  if (!n) return;
  if (!confirm(`Permanently delete ${n} transaction${n===1?'':'s'}? This cannot be undone.`)) return;
  const r = await post('/api/transactions/bulk', {
    action: 'delete',
    ids: Array.from(_bulkSelection),
  });
  if (r.status === 'deleted') {
    toast(`Deleted ${r.count} transaction${r.count===1?'':'s'}`, 'success');
    clearBulkSelection();
    loadTxns();
  } else {
    alert(r.error || 'Bulk delete failed');

async function applyDocBulkUpdate() {
  const n = _docBulkSelection.size;
  if (!n) return;
  const changes = {};
  const cat = document.getElementById('doc-bulk-category').value;
  const eid = document.getElementById('doc-bulk-entity').value;
  const yr  = document.getElementById('doc-bulk-year').value;
  const dt  = document.getElementById('doc-bulk-doctype').value.trim();
  const dupSel = document.getElementById('doc-bulk-dup').value;
  if (cat) changes.category = cat;
  if (eid !== '') changes.entity_id = eid === '_clear' ? null : parseInt(eid);
  if (yr) changes.tax_year = yr;
  if (dt) changes.doc_type = dt;
  if (dupSel !== '') changes.is_duplicate = dupSel === '1';
  if (!Object.keys(changes).length) { alert('Pick at least one field to change.'); return; }
  if (!confirm(`Apply changes to ${n} document${n===1?'':'s'}?\n${JSON.stringify(changes,null,2)}`)) return;
  const r = await post('/api/documents/bulk', {
    action: 'update', ids: Array.from(_docBulkSelection), changes: changes,
  });
  if (r.status === 'updated') {
    toast(`Updated ${r.count} document${r.count===1?'':'s'}`, 'success');
    clearDocBulkSelection();
    document.getElementById('doc-bulk-category').value = '';
    document.getElementById('doc-bulk-entity').value = '';
    document.getElementById('doc-bulk-year').value = '';
    document.getElementById('doc-bulk-doctype').value = '';
    document.getElementById('doc-bulk-dup').value = '';
    docReload();
  } else {
    alert(r.error || 'Bulk update failed');
  }
}

async function applyDocBulkDelete() {
  const n = _docBulkSelection.size;
  if (!n) return;
  if (!confirm(`Permanently delete ${n} document record${n===1?'':'s'}? Their links will be removed.`)) return;
  const r = await post('/api/documents/bulk', {
    action: 'delete', ids: Array.from(_docBulkSelection),
  });
  if (r.status === 'deleted') {
    toast(`Deleted ${r.count} document record${r.count===1?'':'s'}`, 'success');
    clearDocBulkSelection();
    docReload();
  } else {
    alert(r.error || 'Bulk delete failed');
  }
}

function fbBuildHtml(docs) {
  // Group: year → entity → doc_type → [docs]
  const years = {};
  docs.forEach(doc => {
    const y = doc.tax_year || 'Unknown Year';
    const en = doc.entity_name || doc.entity_slug || 'Unassigned';
    const eid = doc.entity_id || 0;
    const dt = doc.doc_type || 'Other';
    if (!years[y]) years[y] = {docs:[], entities:{}};
    if (!years[y].entities[en]) years[y].entities[en] = {id:eid, docs:[], types:{}};
    if (!years[y].entities[en].types[dt]) years[y].entities[en].types[dt] = [];
    years[y].entities[en].types[dt].push(doc);
    years[y].entities[en].docs.push(doc);
    years[y].docs.push(doc);
  });

  return Object.entries(years).sort((a,b)=>b[0].localeCompare(a[0])).map(([yr, yd]) => {
    const totalIncome = yd.docs.filter(d=>d.category==='income').reduce((s,d)=>s+(d.amount||0),0);
    const totalExp = yd.docs.filter(d=>['expense','deduction'].includes(d.category)).reduce((s,d)=>s+(d.amount||0),0);
    const yid = 'fb-y-'+yr;
    const entitiesHtml = Object.entries(yd.entities).sort((a,b)=>a[0].localeCompare(b[0])).map(([en, ed]) => {
      const eid2 = 'fb-e-'+yr+'-'+ed.id;
      const eIncome = ed.docs.filter(d=>d.category==='income').reduce((s,d)=>s+(d.amount||0),0);
      const eExp = ed.docs.filter(d=>['expense','deduction'].includes(d.category)).reduce((s,d)=>s+(d.amount||0),0);
      const typesHtml = Object.entries(ed.types).sort((a,b)=>a[0].localeCompare(b[0])).map(([dt, tdocs]) => {
        const tid = 'fb-t-'+yr+'-'+ed.id+'-'+dt.replace(/\W/g,'_');
        const docsHtml = tdocs.map(doc => {
          const docId = doc.paperless_doc_id || doc.doc_id;
          const plUrl = paperlessDocUrl(docId);
          const amt = doc.amount ? '$'+fmt(doc.amount) : '';
          const amtClass = doc.category==='income' ? 'pos' : (doc.amount ? 'neg' : '');
          const docJson = JSON.stringify(doc).replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
          const inner = `<span class="fb-doc-icon">&#128196;</span>
              <span class="fb-doc-title" title="${esc(doc.title||'')}">${esc(doc.title||'Untitled')}</span>
              <span class="fb-doc-vendor">${esc(doc.vendor||'')}</span>
              <span class="fb-doc-amt ${amtClass}">${amt}</span>
              ${plUrl ? '<span class="fb-doc-link">Open &#8599;</span>' : ''}`;

function _startGmailLogPoller(jobId) {
  _gmLogJobId = jobId;
  _gmLogOffset = 0;
  const panel = document.getElementById('gm-log-panel');
  const lines = document.getElementById('gm-log-lines');
  const statusEl = document.getElementById('gm-log-status');
  const cancelBtn = document.getElementById('gm-cancel-btn');
  panel.style.display='';
  lines.textContent='';
  statusEl.textContent='running…';
  statusEl.style.color='';
  document.getElementById('gm-start-btn').disabled=true;
  cancelBtn.style.display='inline-block';
  if(_gmLogTimer) clearInterval(_gmLogTimer);
  _gmLogTimer = setInterval(async function(){
    const data = await fetch(P+'/api/import/jobs/'+_gmLogJobId+'/logs?offset='+_gmLogOffset).then(r=>r.json()).catch(()=>null);
    if(data?.lines?.length){
      data.lines.forEach(function(l){ lines.textContent += l + '\n'; });
      _gmLogOffset = data.total;
      lines.scrollTop = lines.scrollHeight;
    }
    const job = await fetch(P+'/api/import/jobs/'+_gmLogJobId).then(r=>r.json()).catch(()=>null);
    if(job && !['running','pending','cancelling'].includes(job.status)){
      clearInterval(_gmLogTimer); _gmLogTimer=null;
      cancelBtn.style.display='none';
      const done = job.status==='completed';
      const cancelled = job.status==='cancelled';
      statusEl.textContent = done
        ? '✓ complete — '+job.count_imported+' imported'
        : cancelled ? '⏹ cancelled — '+job.count_imported+' imported so far'
        : '✗ '+job.status+(job.error_msg?' — '+job.error_msg.slice(0,60):'');
      statusEl.style.color = done ? '#56d364' : cancelled ? '#ffc107' : '#f85149';
      document.getElementById('gm-start-btn').disabled=false;
      loadJobs();
    }
  }, 2000);
}

var _jobRefreshTimer = null;

let _jobsCache = [];
let _jobsSort = {col: 'id', dir: -1}; // default: newest first

function sortJobs(col) {
  if (_jobsSort.col === col) _jobsSort.dir *= -1;
  else { _jobsSort.col = col; _jobsSort.dir = col === 'id' ? -1 : 1; }
  renderJobs(_jobsCache);
}

function renderJobs(jobs) {
  const el = document.getElementById('jobsList');
  if (!el) return;
  function fmtAge(iso) {
    if(!iso) return '';
    const s = Math.round((Date.now()-new Date(iso+'Z').getTime())/1000);
    if(s<60) return s+'s ago'; if(s<3600) return Math.round(s/60)+'m ago'; return Math.round(s/3600)+'h ago';
  }
  function durSecs(j) {
    if (j.started_at && j.completed_at)
      return Math.round((new Date(j.completed_at+'Z')-new Date(j.started_at+'Z'))/1000);
    return j.started_at ? (Date.now()-new Date(j.started_at+'Z').getTime())/1000 : 0;
  }
  const col = _jobsSort.col, dir = _jobsSort.dir;
  const sorted = [...jobs].sort((a,b)=>{
    let av, bv;
    if (col==='id')          { av=a.id; bv=b.id; }
    else if (col==='source') { av=a.source_type||''; bv=b.source_type||''; }
    else if (col==='status') { av=a.status||''; bv=b.status||''; }
    else if (col==='count')  { av=a.count_imported||0; bv=b.count_imported||0; }
    else if (col==='started'){ av=a.started_at||''; bv=b.started_at||''; }
    else if (col==='dur')    { av=durSecs(a); bv=durSecs(b); }
    else                     { av=a.id; bv=b.id; }
    if (av < bv) return -dir; if (av > bv) return dir; return 0;
  });
  function thBtn(label, key) {
    const active = _jobsSort.col === key;
    const arrow = active ? (_jobsSort.dir > 0 ? ' ▲' : ' ▼') : ' ⇅';
    return `<th style="cursor:pointer;user-select:none${active?';color:var(--primary)':''}" onclick="sortJobs('${key}')">${label}${arrow}</th>`;
  }
  try {
    el.innerHTML='<div class="tbl-wrap"><table><thead><tr>'
      +thBtn('ID','id')+thBtn('Source','source')+'<th>Entity</th>'
      +thBtn('Status','status')+thBtn('Count','count')+thBtn('Started','started')
      +thBtn('Duration','dur')+'<th>Detail</th><th></th>'
      +'</tr></thead><tbody>'
      +sorted.map(j=>{
        try {
        const dur = j.started_at && j.completed_at
          ? durSecs(j)+'s'
          : j.started_at ? '⏱ '+fmtAge(j.started_at) : '';
        const yearsStr = (() => { try { return JSON.parse(j.config_json||'{}').years||''; } catch(e){ return ''; } })();
        const errMsg = j.error_msg || '';
        const detail = errMsg
          ? `<span style="color:var(--red);font-size:.78rem" title="${esc(errMsg)}">${esc(errMsg.slice(0,80))}${errMsg.length>80?'…':''}</span>`
          : (yearsStr ? `<span style="font-size:.75rem;color:var(--muted)">${esc(String(yearsStr))}</span>` : '');
        const isRunning = ['running','pending','cancelling'].includes(j.status);
        const cancelBtn = isRunning
          ? `<button class="btn btn-sm" style="color:#e53e3e;border-color:#e53e3e;padding:2px 8px;font-size:.72rem"
               onclick="cancelJob(${j.id})">&#9632; Cancel</button>`
          : '';
        const logsBtn = `<button class="btn btn-sm btn-outline" style="padding:2px 8px;font-size:.72rem"
             onclick="openJobLog(${j.id},'${j.source_type||''}')">&#128196; Logs</button>`;
        const delBtn = _isAdmin && !isRunning
          ? `<button class="btn btn-sm" style="color:#e53e3e;padding:2px 6px;font-size:.72rem;background:transparent;border:1px solid #e53e3e"
               onclick="deleteJob(${j.id})" title="Delete job">&#128465;</button>`
          : '';
        return `<tr>
          <td>${j.id}</td>
          <td><strong>${j.source_type||''}</strong></td>
          <td>${esc(j.entity_name||'—')}</td>
          <td><span class="badge badge-${j.status||'pending'}">${j.status||'pending'}</span></td>
          <td>${j.count_imported != null ? j.count_imported : '—'}</td>
          <td style="font-size:.8rem">${(j.started_at||'').slice(0,16).replace('T',' ')}</td>
          <td style="font-size:.8rem">${dur}</td>
          <td>${detail}</td>
          <td style="white-space:nowrap">${cancelBtn} ${logsBtn} ${delBtn}</td></tr>`;
        } catch(e) { return '<tr><td colspan="9" style="color:var(--red);font-size:.78rem">Job render error: '+String(e)+'</td></tr>'; }
      }).join('')+'</tbody></table></div>';
  } catch(e) {
    el.innerHTML = '<div class="empty" style="color:var(--red)">Error rendering jobs: '+String(e)+'</div>';
  }
}

async function loadJobs() {
  const el = document.getElementById('jobsList');
  let jobs = [];
  try {
    const r = await fetch(P+'/api/import/jobs');
    if (r.ok) jobs = await r.json();
  } catch(e) {
    if (el) el.innerHTML = '<div class="empty" style="color:var(--red)">Failed to load jobs — check console.</div>';
    return;
  }
  if (!Array.isArray(jobs)) jobs = [];
  _jobsCache = jobs;
  if(!el) return;
  const hasRunning = jobs.some(j=>j.status==='running'||j.status==='pending');
  const hdr = document.getElementById('jobs-refresh-ind');
  if(hdr) hdr.textContent = hasRunning ? '↻ Auto-refreshing…' : 'Last refreshed: '+new Date().toLocaleTimeString();
  if(!jobs.length){el.innerHTML='<div class="empty">No import jobs yet.</div>';return;}
  renderJobs(jobs);
}

function _renderMessages(msgs, readOnly) {
  var c = document.getElementById('chatMsgs');
  if (!msgs.length) { c.innerHTML='<div class="empty">No messages yet.</div>'; return; }
  c.innerHTML = msgs.map(m=>{
    var editBtn = (!readOnly && m.role==='user')
      ? `<button class="chat-edit-btn" onclick="editMsg(${m.id},this)" title="Edit & resend">&#9998;</button>`
      : '';
    return `<div class="chat-msg ${m.role}" data-msg-id="${m.id}">
      <div class="chat-msg-body">${esc(m.content)}</div>
      <div class="chat-msg-actions">${editBtn}</div>

  }).join('');

function editMsg(msgId, btn) {
  var bubble = btn.closest('.chat-msg');
  if (bubble.classList.contains('chat-msg-editing')) return; // already editing
  var body = bubble.querySelector('.chat-msg-body');
  var currentText = body.textContent;
  // Build inline editor
  var ta = document.createElement('textarea');
  ta.className = 'chat-edit-inline';
  ta.value = currentText;
  var btns = document.createElement('div');
  btns.className = 'chat-edit-btns';
  btns.innerHTML = '<button class="chat-edit-save">Save & Resend</button><button class="chat-edit-cancel">Cancel</button>';
  bubble.classList.add('chat-msg-editing');
  bubble.appendChild(ta);
  bubble.appendChild(btns);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  async function doSave() {
    var newText = ta.value.trim();
    cleanup();
    if (!newText || newText === currentText.trim()) return;
    await post('/api/chat/sessions/'+curSess+'/edit', {from_message_id: msgId, message: newText});
    await loadSess(curSess);
    document.getElementById('chatIn').value = newText;
    sendMsg();
  }
  function cleanup() {
    bubble.classList.remove('chat-msg-editing');
    ta.remove();
    btns.remove();
  }
  btns.querySelector('.chat-edit-save').onclick = doSave;
  btns.querySelector('.chat-edit-cancel').onclick = cleanup;
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doSave(); }
    if (e.key === 'Escape') { cleanup(); }
  });
}

async function sendMsg() {
  var input = document.getElementById('chatIn');
  var msg = input.value.trim();
  if(!msg) return;
  if(!curSess) { await newSession(); }
  if(!curSess){toast('Could not create session','error');return;}
  input.value=''; input.style.height='auto';
  var c = document.getElementById('chatMsgs');
  c.querySelector('.empty')?.remove();
  var ub = document.createElement('div'); ub.className='chat-msg user';
  ub.innerHTML='<div class="chat-msg-body">'+esc(msg)+'</div><div class="chat-msg-actions"></div>';
  c.appendChild(ub);
  var ab = document.createElement('div'); ab.className='chat-msg assistant thinking';
  ab.innerHTML='<div class="chat-msg-body">Thinking…</div>';
  c.appendChild(ab);
  c.scrollTop=c.scrollHeight;
  document.getElementById('sendBtn').style.display='none';
  document.getElementById('stopBtn').style.display='inline-flex';
  _chatAbortCtrl = new AbortController();
  try {
    var resp = await fetch(P+'/api/chat/sessions/'+curSess+'/send',{
      method:'POST', signal:_chatAbortCtrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,stream:true})
    });
    if(resp.headers.get('content-type')?.includes('text/event-stream')) {
      ab.querySelector('.chat-msg-body').textContent='';
      ab.classList.remove('thinking');
      var reader=resp.body.getReader(); var dec=new TextDecoder(); var buf='';
      while(true) {
        var {done,value}=await reader.read(); if(done) break;
        buf+=dec.decode(value,{stream:true});
        var lines=buf.split('\n'); buf=lines.pop();
        for(var l of lines) {
          if(!l.startsWith('data: ')) continue;
          var dstr=l.slice(6).trim(); if(dstr==='[DONE]') break;
          try{var o=JSON.parse(dstr);if(o.text)ab.querySelector('.chat-msg-body').textContent+=o.text;}catch{}
          c.scrollTop=c.scrollHeight;
        }
      }
    } else {
      var dj=await resp.json();
      ab.classList.remove('thinking');
      ab.querySelector('.chat-msg-body').textContent=dj.response||dj.error||'No response.';
    }
  } catch(e) {
    ab.classList.remove('thinking');
    if(e.name!=='AbortError') ab.querySelector('.chat-msg-body').textContent='Connection error: '+e.message;
    else ab.querySelector('.chat-msg-body').textContent+=' [stopped]';
  }
  finally {
    document.getElementById('sendBtn').style.display='inline-flex';
    document.getElementById('stopBtn').style.display='none';
    _chatAbortCtrl = null;
    // Reload messages to attach real IDs (needed for edit buttons)
    try {
      var r2 = await fetch(P+'/api/chat/sessions/'+curSess+'/messages');
      if (r2.ok) { var d2 = await r2.json(); _renderMessages(d2.messages||[], false); }
    } catch(_){}
    c.scrollTop=c.scrollHeight;
  }
}

var _trAbortCtrl = null;
async function runTaxReview() {
  const year = document.getElementById('tr-year').value;
  const eid = document.getElementById('tr-entity').value;
  if (!year) { toast('Select a year to review.','error'); return; }
  const btn = document.getElementById('tr-run-btn');
  const stopBtn = document.getElementById('tr-stop-btn');
  const output = document.getElementById('tr-review-output');
  const content = document.getElementById('tr-review-content');
  const status = document.getElementById('tr-review-status');
  document.getElementById('tr-review-year').textContent = year;
  output.style.display = '';
  content.textContent = '';
  // Reset Q&A thread for new review
  const qaThread = document.getElementById('tr-qa-thread');
  if (qaThread) qaThread.innerHTML = '';
  _trQaMessages = [];
  btn.style.display = 'none';
  stopBtn.style.display = '';
  status.textContent = 'Reviewing…';
  _trAbortCtrl = new AbortController();
  const params = new URLSearchParams({year});
  if (eid) params.set('entity_id', eid);
  try {
    const resp = await fetch(P+'/api/tax-review?'+params, {headers:{'Accept':'text/event-stream'}, signal:_trAbortCtrl.signal});
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    outer: while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') { status.textContent = 'Complete'; break outer; }
        try {
          const d = JSON.parse(raw);
          if (d.chunk) { content.textContent += d.chunk; content.scrollTop = content.scrollHeight; }
          if (d.error) { content.textContent += '\n\nError: '+d.error; status.textContent = 'Error'; break outer; }
        } catch(e) {}
      }
    }
  } catch(e) {
    if (e.name === 'AbortError') { status.textContent = 'Stopped'; }
    else { status.textContent = 'Error: '+e.message; }
  }
  btn.style.display = '';
  stopBtn.style.display = 'none';
  _trAbortCtrl = null;
  if (status.textContent === 'Reviewing…') status.textContent = 'Complete';
  // Seed Q&A history with the initial review so follow-ups have full context
  const reviewText = document.getElementById('tr-review-content')?.textContent || '';
  if (reviewText) {
    _trQaMessages = [{role:'assistant', content: reviewText}];
    document.getElementById('tr-qa-input')?.focus();
  }
}
function stopTaxReview() { if (_trAbortCtrl) _trAbortCtrl.abort(); }

async function trSendFollowup() {
  const input = document.getElementById('tr-qa-input');
  const msg = input.value.trim();
  if (!msg) return;
  const year = document.getElementById('tr-year').value;
  const eid = document.getElementById('tr-entity').value;
  const sendBtn = document.getElementById('tr-qa-send-btn');
  const stopBtn = document.getElementById('tr-qa-stop-btn');

  // Add user message to history and UI
  _trQaMessages.push({role:'user', content: msg});
  _trQaAppend('user', msg);
  input.value = '';
  sendBtn.disabled = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = '';

  // Create streaming div for assistant response
  const streamDiv = _trQaAppend('assistant', '', true);
  streamDiv.querySelector('div').nextSibling?.remove?.();
  let responseText = '';

  _trQaAbort = new AbortController();
  try {
    const resp = await fetch(P+'/api/tax-review/followup', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({year, entity_id: eid||null, messages: _trQaMessages}),
      signal: _trQaAbort.signal,
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    outer: while(true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break outer;
        try {
          const d = JSON.parse(raw);
          if (d.chunk) {
            responseText += d.chunk;
            // Re-render the streaming div content
            const label = streamDiv.querySelector('div');
            if (label) label.nextSibling ? label.nextSibling.textContent = responseText : streamDiv.appendChild(Object.assign(document.createTextNode(responseText)));
            // Simpler: just update the full innerHTML safely
            streamDiv.innerHTML = `<div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;font-weight:600">AI ACCOUNTANT</div>${esc(responseText)}`;
            streamDiv.scrollIntoView({behavior:'smooth', block:'nearest'});
          }
          if (d.error) { responseText += '\n[Error: '+d.error+']'; break outer; }
        } catch(e) {}
      }
    }
  } catch(e) {
    if (e.name !== 'AbortError') responseText += '\n[Error: '+e.message+']';
  }

  // Remove streaming id, save to history
  streamDiv.id = '';
  if (responseText) _trQaMessages.push({role:'assistant', content: responseText});
  sendBtn.disabled = false;
  sendBtn.style.display = '';
  stopBtn.style.display = 'none';
  _trQaAbort = null;
}

/* ============================================================
   TableManager — sortable, filterable, resizable columns
   ============================================================ */
class TableManager {
  constructor({tableId, data, columns, renderRow, filterRow}) {
    this.tableId = tableId;
    this.data = data;
    this.columns = columns; // [{key, label, type:'str'|'num'|'date', sortable, filterable}]
    this.renderRow = renderRow;
    this.filterRow = filterRow !== false; // default true
    this.sortKey = null;
    this.sortDir = 1; // 1=asc, -1=desc
    this.filters = {};
    this._build();
  }

  _build() {
    const table = document.getElementById(this.tableId);
    if (!table) return;
    // Build header
    const thead = table.querySelector('thead') || table.createTHead();
    thead.innerHTML = '';
    const hrow = thead.insertRow();
    this.columns.forEach((col, ci) => {
      const th = document.createElement('th');
      th.textContent = col.label;
      if (col.sortable !== false) {
        th.classList.add('sortable');
        th.addEventListener('click', (e) => {
          if (e.target.classList.contains('col-resize')) return;
          if (this.sortKey === col.key) this.sortDir *= -1;
          else { this.sortKey = col.key; this.sortDir = 1; }
          this._updateSortHeaders(thead);
          this._render();
        });
      }
      // Resize handle
      const rh = document.createElement('span');
      rh.className = 'col-resize';
      rh.addEventListener('mousedown', (e) => this._startResize(e, th));
      th.appendChild(rh);
      hrow.appendChild(th);
    });
    // Filter row
    if (this.filterRow) {
      const frow = thead.insertRow();
      frow.className = 'tbl-filter-row';
      this.columns.forEach((col) => {
        const th = document.createElement('th');
        if (col.filterable !== false) {
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.placeholder = col.label + '…';
          inp.addEventListener('input', () => { this.filters[col.key] = inp.value.trim().toLowerCase(); this._render(); });
          th.appendChild(inp);
        }
        frow.appendChild(th);
      });
    }
    this._render();
  }

  _updateSortHeaders(thead) {
    thead.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
    this.columns.forEach((col, ci) => {
      if (col.key === this.sortKey) {
        const ths = thead.querySelectorAll('tr:first-child th');
        if (ths[ci]) ths[ci].classList.add(this.sortDir === 1 ? 'sort-asc' : 'sort-desc');
      }
    });
  }

  _render() {
    const table = document.getElementById(this.tableId);
    if (!table) return;
    let rows = [...this.data];
    // Filter
    Object.entries(this.filters).forEach(([k, v]) => {
      if (!v) return;
      rows = rows.filter(r => String(r[k]||'').toLowerCase().includes(v));
    });
    // Sort
    if (this.sortKey) {
      const col = this.columns.find(c=>c.key===this.sortKey);
      rows.sort((a, b) => {
        let av = a[this.sortKey], bv = b[this.sortKey];
        if (col?.type === 'num') { av = parseFloat(av)||0; bv = parseFloat(bv)||0; }
        else { av = String(av||'').toLowerCase(); bv = String(bv||'').toLowerCase(); }
        return av < bv ? -this.sortDir : av > bv ? this.sortDir : 0;
      });
    }
    let tbody = table.querySelector('tbody');
    if (!tbody) { tbody = document.createElement('tbody'); table.appendChild(tbody); }
    tbody.innerHTML = rows.length ? rows.map(r => this.renderRow(r)).join('') :
      `<tr><td colspan="${this.columns.length}"><div class="empty">No matching records.</div></td></tr>`;
  }

  setData(data) { this.data = data; this._render(); }

  _startResize(e, th) {
    e.preventDefault();
    const startX = e.clientX, startW = th.offsetWidth;
    const rh = th.querySelector('.col-resize');
    if (rh) rh.classList.add('dragging');
    const onMove = ev => { th.style.width = Math.max(50, startW + ev.clientX - startX) + 'px'; };
    const onUp = () => {
      if (rh) rh.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }
}

        var ca = document.getElementById('gm-connect-area');
        if (ca) ca.style.display = s.has_credentials ? '' : 'none';
      } catch(e) {}
    },

    sendMessage: async function() {
      if (GM.isStreaming) return;
      var input = document.getElementById('gm-chat-input');
      var msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      var lower = msg.toLowerCase();
      if ((lower.indexOf('have credentials') !== -1 || lower.indexOf('credentials.json') !== -1)
          && lower.indexOf('upload') === -1 && lower.indexOf('ready') !== -1) {
        GM.appendMessage('user', msg);
        GM.appendMessage('assistant', "Great! Switch to the Manual Upload tab above to upload your credentials.json file. Once uploaded, you'll see a 'Connect Gmail Account' button.");
        GM.switchMode('manual');
        return;
      }
      GM.appendMessage('user', msg);
      GM.chatHistory.push({role:'user', content:msg});
      GM.isStreaming = true;
      var sendBtn = document.getElementById('gm-send-btn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loader white"></span>';
      GM.showTyping();
      var accumulated = '';
      var streamBubble = null;
      try {
        var res = await fetch(P + '/api/import/gmail/setup-chat', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message:msg, history:GM.chatHistory})
        });
        if (!res.ok) throw new Error(await res.text() || res.statusText);
        GM.removeTyping();
        var msgs = document.getElementById('gm-chat-msgs');
        var wrapDiv = document.createElement('div');
        wrapDiv.className = 'gm-chat-msg assistant';
        var avEl = document.createElement('div');
        avEl.className = 'gm-msg-av';
        avEl.textContent = 'AI';

        streamBubble.className = 'gm-msg-bubble';
        wrapDiv.appendChild(avEl);
        wrapDiv.appendChild(streamBubble);
        msgs.appendChild(wrapDiv);
        GM.scrollBottom();
        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buf = '';
        while (true) {
          var result = await reader.read();
          if (result.done) break;
          buf += decoder.decode(result.value, {stream:true});
          var lines = buf.split('\n');
          buf = lines.pop();
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.startsWith('data: ')) {
              var data = line.slice(6).trim();
              if (data === '[DONE]') break;
              try {
                var parsed = JSON.parse(data);
                var text = parsed.text || parsed.content || parsed.delta || '';
                accumulated += text;
                streamBubble.innerHTML = GM.escHtml(accumulated).replace(/\n/g,'<br>');
              } catch(pe) {}
            }
          }
        }
        GM.scrollBottom();
        if (!accumulated) {
          if (streamBubble) streamBubble.innerHTML = '<em style="color:#aaa">No response received.</em>';
        } else {
          GM.chatHistory.push({role:'assistant', content:accumulated});
          var al = accumulated.toLowerCase();
          if (al.indexOf('upload') !== -1 && al.indexOf('credentials') !== -1 && streamBubble) {
            var hint = document.createElement('div');
            hint.style.marginTop = '8px';
            hint.innerHTML = '<button class="btn btn-outline btn-sm" onclick="gmSwitchMode(\'manual\')">&rarr; Go to Manual Upload</button>';

          }

      } catch(e) {
        GM.removeTyping();
        GM.appendMessage('assistant', 'Could not reach the assistant (' + GM.escHtml(e.message) + '). Use the Manual Upload tab to upload credentials.json directly.');
      } finally {
        GM.isStreaming = false;
        sendBtn.disabled = false;

/* ── PayPal Setup Modal ──────────────────────────────────────────────── */
(function() {
  var PP = {
    chatHistory: [],
    initialized: false,
    isStreaming: false,

    scrollBottom: function() {
      var msgs = document.getElementById('pp-chat-msgs');
      if (!msgs) return;
      requestAnimationFrame(function() { msgs.scrollTop = msgs.scrollHeight; });
    },

    appendMessage: function(role, content) {
      var msgs = document.getElementById('pp-chat-msgs');
      var div = document.createElement('div');
      div.className = 'gm-chat-msg ' + role;
      var av = document.createElement('div');
      av.className = 'gm-msg-av';
      av.textContent = role === 'user' ? 'You' : 'AI';
      var bubble = document.createElement('div');
      bubble.className = 'gm-msg-bubble';
      bubble.textContent = content;
      div.appendChild(av); div.appendChild(bubble);
      msgs.appendChild(div);
      PP.scrollBottom();
      return bubble;
    },

    showTyping: function() {
      var msgs = document.getElementById('pp-chat-msgs');
      var div = document.createElement('div');
      div.className = 'gm-chat-msg assistant';
      div.id = 'pp-typing';
      div.innerHTML = '<div class="gm-msg-av">AI</div><div class="gm-msg-bubble"><div class="gm-typing-dots"><span></span><span></span><span></span></div></div>';
      msgs.appendChild(div);
      PP.scrollBottom();
    },

    removeTyping: function() {
      var t = document.getElementById('pp-typing');
      if (t) t.remove();
    },

    initChat: function() {
      var initEl = document.getElementById('pp-chat-init');
      if (initEl) initEl.remove();
      PP.appendMessage('assistant',
        'Hi! I\'ll guide you through connecting your PayPal account. To start, do you have an existing PayPal Developer account, or are you setting one up for the first time?');
      PP.chatHistory = [];
      PP.initialized = true;
    },

    sendMessage: async function() {
      if (PP.isStreaming) return;
      var input = document.getElementById('pp-chat-input');
      var msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      PP.appendMessage('user', msg);
      PP.showTyping();
      PP.isStreaming = true;
      document.getElementById('pp-send-btn').disabled = true;

      var accumulated = '';
      var streamBubble = null;
      try {
        var res = await fetch(P + '/api/import/paypal/setup-chat', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message:msg, history:PP.chatHistory})
        });
        if (!res.ok) throw new Error(await res.text() || res.statusText);
        PP.removeTyping();
        var msgs = document.getElementById('pp-chat-msgs');
        var wrapDiv = document.createElement('div');
        wrapDiv.className = 'gm-chat-msg assistant';
        var avEl = document.createElement('div');
        avEl.className = 'gm-msg-av';
        avEl.textContent = 'AI';
        streamBubble = document.createElement('div');
        streamBubble.className = 'gm-msg-bubble';
        wrapDiv.appendChild(avEl); wrapDiv.appendChild(streamBubble);
        msgs.appendChild(wrapDiv);

        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buf = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buf += decoder.decode(chunk.value, {stream:true});
          var lines = buf.split('\n');
          buf = lines.pop();
          for (var line of lines) {
            if (!line.startsWith('data: ')) continue;
            var payload = line.slice(6).trim();
            if (payload === '[DONE]') break;
            try {
              var parsed = JSON.parse(payload);
              if (parsed.text) {
                accumulated += parsed.text;
                streamBubble.textContent = accumulated;
                PP.scrollBottom();
              }
            } catch(e) {}
          }
        }
        PP.chatHistory.push({role:'user',content:msg});
        PP.chatHistory.push({role:'assistant',content:accumulated});

        // Offer fill-in shortcut if credentials mentioned
        if (/client.?id|client.?secret|credential/i.test(accumulated)) {
          var hint = document.createElement('div');
          hint.style.marginTop = '8px';
          hint.innerHTML = '<button class="btn btn-outline btn-sm" onclick="closeM(\'mPaypalSetup\')">&rarr; Fill in credentials below</button>';
          streamBubble.appendChild(hint);
        }
      } catch(e) {
        PP.removeTyping();
        PP.appendMessage('assistant', 'Error: ' + e.message);
      } finally {
        PP.isStreaming = false;
        document.getElementById('pp-send-btn').disabled = false;
        PP.scrollBottom();
      }
    },
  };

  // Public interface
  window.openPaypalSetupModal = function() {
    document.getElementById('mPaypalSetup').classList.add('open');
    if (!PP.initialized) { PP.initChat(); }
  };
  window.ppSendMessage = function() { PP.sendMessage(); };
  window.ppSendQuick = function(t) { document.getElementById('pp-chat-input').value=t; PP.sendMessage(); };
  window.ppInputKeydown = function(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();PP.sendMessage();} };
  window.ppResetChat = function() {
    if(!confirm('Start a fresh setup conversation?'))return;
    PP.chatHistory=[];PP.initialized=false;
    document.getElementById('pp-chat-msgs').innerHTML='';
    PP.initChat();
  };
})();
</script>

<script>
// ── US Alliance FCU importer ──────────────────────────────────────────────
(function() {
  var _usaJobId = null;
  var _usaLogTimer = null;
  var _usaLogOffset = 0;

  window.usaCopySnippet = function() {
    var el = document.getElementById('usa-cookie-snippet');
    var btn = document.getElementById('usa-snippet-copy-btn');
    if (!el) return;
    var text = el.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✓ Copied!';
        setTimeout(function(){ btn.innerHTML = '&#128203; Copy'; }, 2000);
      }).catch(function() {
        _usaFallbackCopy(text, btn);
      });
    } else {
      _usaFallbackCopy(text, btn);
    }
  };

  function _usaFallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try {
      document.execCommand('copy');
      if (btn) { btn.textContent = '✓ Copied!'; setTimeout(function(){ btn.innerHTML = '&#128203; Copy'; }, 2000); }
    } catch(e) {
      alert('Copy failed — please select the snippet text manually.');
    }
    document.body.removeChild(ta);
  }

  window.saveUsaCreds = async function() {
    var u = document.getElementById('usa-username').value.trim();
    var p = document.getElementById('usa-password').value.trim();
    if (!u || !p) { alert('Enter both username and password.'); return; }
    var r = await post('/api/import/usalliance/credentials', {username: u, password: p});
    if (r.status === 'saved') {
      document.getElementById('usa-status-badge').innerHTML =
        '<span style="color:#4caf50">&#10003; Credentials saved</span>';
      document.getElementById('usa-password').value = '';
    } else {
      alert(r.error || 'Save failed.');
    }
  };

  window.loadUsaStatus = async function() {
    var r = await fetch(P + '/api/import/usalliance/status').then(r => r.json()).catch(() => ({}));
    var badge = document.getElementById('usa-status-badge');
    if (!badge) return;
    if (r.configured) {
      badge.innerHTML = '<span style="color:#4caf50">&#10003; Credentials configured (' + (r.username_preview||'') + ')</span>';
    } else {
      badge.innerHTML = '<span style="color:#f57c00">&#9888; No credentials saved — enter them below</span>';
    }
    // Cookie status
    var ckEl = document.getElementById('usa-cookie-status');
    if (ckEl) {
      if (r.cookies_saved) {
        ckEl.innerHTML = '<span style="color:#4caf50">&#10003; ' + r.cookies_count + ' cookies saved — cookie auth active</span>';
        // Show bot notice as info, not warning
        var notice = document.getElementById('usa-bot-notice');
        if (notice) notice.style.display = 'none';
      } else {
        ckEl.innerHTML = '<span style="color:var(--muted)">No cookies saved — using credential login</span>';
      }
    }
  };

  window.saveUsaCookies = async function() {
    var raw = document.getElementById('usa-cookies-input').value.trim();
    if (!raw) { alert('Paste your cookies JSON first.'); return; }
    var res = document.getElementById('usa-cookie-result');
    res.innerHTML = '<span style="color:var(--muted)">Saving…</span>';
    var r = await post('/api/import/usalliance/cookies', {cookies: raw});
    if (r.status === 'saved') {
      res.innerHTML = '<span style="color:#4caf50">&#10003; ' + esc(r.message) + '</span>';
      document.getElementById('usa-cookies-input').value = '';
      document.getElementById('usa-bot-notice').style.display = 'none';
      await loadUsaStatus();
    } else {
      res.innerHTML = '<span style="color:#d32f2f">&#10007; ' + esc(r.error || 'Failed to save cookies') + '</span>';
    }
  };

  window.clearUsaCookies = async function() {
    if (!confirm('Clear saved browser cookies?')) return;
    var r = await fetch(P + '/api/import/usalliance/cookies', {method:'DELETE'}).then(r=>r.json()).catch(()=>({}));
    document.getElementById('usa-cookie-status').innerHTML = '<span style="color:var(--muted)">Cookies cleared</span>';
    document.getElementById('usa-cookie-result').innerHTML = '';
    await loadUsaStatus();
  };

  window.testUsaCreds = async function() {
    var u = document.getElementById('usa-username').value.trim();
    var p = document.getElementById('usa-password').value.trim();
    var btn = document.getElementById('usa-test-btn');
    var res = document.getElementById('usa-test-result');
    // Save first if fields are filled
    if (u && p) { await post('/api/import/usalliance/credentials', {username: u, password: p}); }
    btn.disabled = true; btn.textContent = 'Testing…';
    res.innerHTML = '<span style="color:var(--muted)">Attempting login…</span>';
    var r = await post('/api/import/usalliance/test', {}).catch(() => ({error: 'Request failed'}));
    btn.disabled = false; btn.innerHTML = '&#9654; Test Login';
    if (r && r.status === 'ok') {
      res.innerHTML = '<span style="color:var(--green)">&#10003; ' + (r.message || 'Login successful') + '</span>';
    } else {
      res.innerHTML = '<span style="color:var(--red)">&#10007; ' + esc(r && r.error || 'Login failed — check credentials') + '</span>';
    }
  };

  window.startUsaImport = async function() {
    var yearsRaw = document.getElementById('usa-years-input').value.trim();
    var years = yearsRaw.split(/[\s,]+/).filter(Boolean);
    var eid = document.getElementById('usa-entity').value;
    if (!years.length) { alert('Enter at least one year (e.g. 2021,2022).'); return; }
    var r = await post('/api/import/usalliance/start', {entity_id: eid||null, years: years});
    if (r.error) { alert(r.error); return; }
    _usaJobId = r.job_id;
    _usaLogOffset = 0;
    document.getElementById('usa-log-panel').style.display = '';
    document.getElementById('usa-log-lines').innerHTML = '';
    document.getElementById('usa-log-status').textContent = 'running';
    document.getElementById('usa-start-btn').disabled = true;
    _pollUsaLogs();
  };

  function _pollUsaLogs() {
    if (!_usaJobId) return;
    fetch(P + '/api/import/jobs/' + _usaJobId + '/logs?offset=' + _usaLogOffset)
      .then(r => r.json()).then(data => {
        if (data.lines && data.lines.length) {
          var box = document.getElementById('usa-log-lines');
          data.lines.forEach(function(line) {
            var div = document.createElement('div');
            div.textContent = line;
            // Highlight MFA prompt
            if (line.toLowerCase().includes('mfa') || line.toLowerCase().includes('verification')) {
              div.style.color = '#ffc107';
              document.getElementById('usa-mfa-box').style.display = '';
            }
            // Highlight bot detection error
            if (line.toLowerCase().includes('bot detection') || line.toLowerCase().includes('unable to log')) {
              div.style.color = '#ff7043';
              var notice = document.getElementById('usa-bot-notice');
              if (notice) notice.style.display = '';
            }
            box.appendChild(div);
          });
          box.scrollTop = box.scrollHeight;
          _usaLogOffset = data.total;
        }
        // Check job status
        fetch(P + '/api/import/jobs/' + _usaJobId)
          .then(r => r.json()).then(function(job) {
            var done = job.status === 'completed' || job.status === 'error';
            document.getElementById('usa-log-status').textContent = job.status || 'running';
            if (done) {
              document.getElementById('usa-start-btn').disabled = false;
              document.getElementById('usa-mfa-box').style.display = 'none';
              clearTimeout(_usaLogTimer);
              _usaLogTimer = null;
            } else {
              _usaLogTimer = setTimeout(_pollUsaLogs, 2500);
            }
          }).catch(() => { _usaLogTimer = setTimeout(_pollUsaLogs, 5000); });
      }).catch(() => { _usaLogTimer = setTimeout(_pollUsaLogs, 5000); });
  }

  window.submitUsaMfa = async function() {
    var code = document.getElementById('usa-mfa-code').value.trim();
    if (!code || !_usaJobId) return;
    var r = await post('/api/import/usalliance/mfa', {job_id: _usaJobId, code: code});
    if (r.status === 'ok') {
      document.getElementById('usa-mfa-code').value = '';
      document.getElementById('usa-mfa-box').style.display = 'none';
    } else {
      alert(r.error || 'Failed to submit MFA code.');
    }
  };

  // Load status when tab is activated
  var _origImpTab = window.impTab;
  window.impTab = function(name, btn) {
    if (_origImpTab) _origImpTab(name, btn);
    if (name === 'usalliance') loadUsaStatus();
  };
})();
</script>
