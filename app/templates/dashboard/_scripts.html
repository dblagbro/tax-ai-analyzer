<script>
/* ─────────────────────────────────────────────────────────────────────────
   _scripts.html — thin bootstrap for the dashboard SPA.
   Flask-templated globals are declared inline here; all application logic
   lives in /static/js/dashboard/*.js modules loaded below.
   ─────────────────────────────────────────────────────────────────────── */
const P = '{{ url_prefix }}';
const PAPERLESS_WEB_URL = '{{ paperless_web_url }}';
let curSess = null;
var _myUserId = {{ current_user.id if current_user.is_authenticated else 0 }};
var _isAdmin = {{ 'true' if current_user.is_authenticated and current_user.is_admin else 'false' }};

document.addEventListener('DOMContentLoaded', () => {
  const t = '{{ active_tab or "dashboard" }}';
  loadTab(t);
  document.getElementById('uToggle').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('uMenu').classList.toggle('open');
  });
  document.addEventListener('click', () => document.getElementById('uMenu').classList.remove('open'));
  refreshHealth();
  setInterval(refreshHealth, 30000);
});
</script>

{#
  Load order matters — core.js must precede everything (defines P-use helpers
  post/toast/esc/fmt and shared infra like sw/loadTab/refreshHealth).
  table_manager.js must precede transactions.js / documents.js (uses TableManager).
#}
<script src="{{ url_prefix }}/static/js/dashboard/core.js"></script>
