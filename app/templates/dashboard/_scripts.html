/* ───── Vendor merge ───── */
const _vendorSelection = new Set();
let _vendorData = [];  // cached for client-side filter

async function loadVendors() {
  _vendorSelection.clear();
  updateVendorMergeBar();
  const body = document.getElementById('vendor-body');
  body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--muted)"><div class="spinner"></div></td></tr>';

  const p = new URLSearchParams();
  const e = document.getElementById('tf-entity')?.value; if (e) p.set('entity_id', e);
  const y = document.getElementById('tf-year')?.value;   if (y) p.set('year', y);
  const search = document.getElementById('vendor-search')?.value.trim(); if (search) p.set('search', search);
  p.set('group_by', document.getElementById('vendor-group-raw')?.checked ? 'raw' : 'normalized');

  const r = await fetch(P+'/api/vendors?'+p).then(r=>r.json()).catch(()=>({vendors:[]}));
  _vendorData = r.vendors || [];
  renderVendorList();
  document.getElementById('vendor-count-label').textContent =
    `${_vendorData.length} unique vendor${_vendorData.length===1?'':'s'}`;
}

function renderVendorList() {
  const body = document.getElementById('vendor-body');
  const searchTerm = (document.getElementById('vendor-search')?.value || '').toLowerCase();
  const isRaw = document.getElementById('vendor-group-raw')?.checked;
  const filtered = searchTerm
    ? _vendorData.filter(v => {
        const name = (v.vendor_normalized || v.vendor || '').toLowerCase();
        const raws = (v.raw_variants || v.vendor || '').toLowerCase();
        return name.includes(searchTerm) || raws.includes(searchTerm);
      })
    : _vendorData;
  if (!filtered.length) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--muted)">No vendors match.</td></tr>';
    return;
  }
  body.innerHTML = filtered.map(v => {
    // In raw-group mode we select by the exact 'vendor' string (one per row).
    // In normalized-group mode we select all raw variants collapsing into that canonical.
    const key = isRaw ? v.vendor : v.vendor_normalized;
    const selectable = isRaw ? [v.vendor] : (v.raw_variants || v.vendor_normalized || '').split(',').filter(Boolean);
    const selKey = JSON.stringify(selectable);
    const checked = Array.from(_vendorSelection).some(s => s.key === key) ? 'checked' : '';
    const canonical = v.vendor_normalized || v.vendor || '(blank)';
    const variants = isRaw ? '' : (v.variant_count > 1 ? `${v.variant_count} variants: ${esc((v.raw_variants||'').slice(0,80))}${(v.raw_variants||'').length>80?'…':''}` : '');
    const total = (v.total || 0).toLocaleString(undefined, {maximumFractionDigits:2});
    return `<tr>
      <td style="padding:0 4px"><input type="checkbox" class="vendor-check" data-key="${esc(key)}" data-from='${esc(selKey)}' ${checked} onclick="toggleVendorRow(this)"></td>
      <td><strong>${esc(canonical)}</strong></td>
      <td style="font-size:.78rem;color:var(--muted);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(v.raw_variants||'')}">${variants}</td>
      <td style="text-align:right;font-weight:600">${v.count||0}</td>
      <td style="text-align:right;font-weight:600">$${total}</td>
      <td style="font-size:.78rem;color:var(--muted);white-space:nowrap">${esc((v.first_seen||'').slice(0,10))}</td>
      <td style="font-size:.78rem;color:var(--muted);white-space:nowrap">${esc((v.last_seen||'').slice(0,10))}</td>
      <td style="white-space:nowrap"><button class="btn btn-sm btn-outline" onclick="renameVendor('${esc(key).replace(/'/g,"\\'")}')">Rename</button></td>
    </tr>`;
  }).join('');
}

function filterVendorList() { renderVendorList(); }

function toggleVendorRow(cb) {
  const key = cb.dataset.key;
  let fromList = [];
  try { fromList = JSON.parse(cb.dataset.from); } catch(e) { fromList = [key]; }
  if (cb.checked) {
    _vendorSelection.add(JSON.stringify({key, from: fromList}));
    // dedupe by key (a toggle on different element with same key)
  } else {
    for (const s of Array.from(_vendorSelection)) {
      try { if (JSON.parse(s).key === key) _vendorSelection.delete(s); } catch(e) {}
    }
  }
  updateVendorMergeBar();
}

function toggleAllVendors(cb) {
  const boxes = document.querySelectorAll('.vendor-check');
  boxes.forEach(b => {
    b.checked = cb.checked;
    toggleVendorRow(b);
  });
}

function clearVendorSelection() {
  _vendorSelection.clear();
  document.querySelectorAll('.vendor-check').forEach(b => b.checked = false);
  const sa = document.getElementById('vendor-select-all');
  if (sa) sa.checked = false;
  document.getElementById('vendor-merge-target').value = '';
  updateVendorMergeBar();
}

function updateVendorMergeBar() {
  const bar = document.getElementById('vendor-merge-bar');
  if (!bar) return;
  const n = _vendorSelection.size;
  bar.style.display = n > 0 ? '' : 'none';
  const countEl = document.getElementById('vendor-select-count');
  if (countEl) countEl.textContent = n;
  // Suggestion: if exactly one vendor selected with variants, prefill merge target
  if (n === 1) {
    try {
      const sel = JSON.parse(Array.from(_vendorSelection)[0]);
      const target = document.getElementById('vendor-merge-target');
      if (target && !target.value) target.value = sel.key;
    } catch(e) {}
  }
}

async function doVendorMerge() {
  const to_vendor = document.getElementById('vendor-merge-target').value.trim();
  if (!to_vendor) { alert('Enter a canonical vendor name to merge into.'); return; }
  // Collect all from_vendors by flattening each selected group's raw variants
  const fromVendors = [];
  for (const s of _vendorSelection) {
    try {
      const obj = JSON.parse(s);
      (obj.from || [obj.key]).forEach(v => fromVendors.push(v));
    } catch(e) {}
  }
  const uniqueFrom = Array.from(new Set(fromVendors.filter(Boolean)));
  if (!uniqueFrom.length) { alert('No source vendors selected.'); return; }
  if (!confirm(`Merge ${uniqueFrom.length} vendor name${uniqueFrom.length===1?'':'s'} into "${to_vendor}"?\n\nThis rewrites the vendor column on all matching transactions.`)) return;
  const r = await post('/api/vendors/merge', {
    from_vendors: uniqueFrom,
    to_vendor: to_vendor,
    update_normalized: true,
  });
  if (r.status === 'merged') {
    toast(`Merged ${r.count} transaction${r.count===1?'':'s'} into "${to_vendor}"`, 'success');
    clearVendorSelection();
    loadVendors();
  } else if (r.status === 'noop') {
    toast('No transactions matched the selected vendor names', 'info');
  } else {
    alert(r.error || 'Merge failed');
  }
}

async function renameVendor(currentName) {
  const newName = prompt(`Rename "${currentName}" to:`, currentName);
  if (!newName || newName.trim() === currentName) return;
  const r = await post('/api/vendors/rename', {
    from_vendor: currentName,
    to_vendor: newName.trim(),
  });
  if (r.status === 'renamed') {
    toast(`Renamed ${r.count} transaction${r.count===1?'':'s'}`, 'success');
    loadVendors();
  } else {
    alert(r.error || 'Rename failed');
  }
}

/* ───── Year-over-Year report ───── */
async function loadYoY() {
  const yearsRaw = (document.getElementById('yoy-years')?.value || '').trim();
  const years = yearsRaw.split(/[\s,]+/).filter(Boolean);
  const entityId = document.getElementById('yoy-entity')?.value || '';
  const resEl = document.getElementById('yoy-result');
  if (years.length < 2) {
    resEl.innerHTML = '<div class="empty" style="padding:30px;color:#d32f2f;text-align:center">Enter at least 2 years.</div>';
    return;
  }
  resEl.innerHTML = '<div class="empty" style="padding:40px;color:var(--muted);text-align:center"><div class="spinner"></div></div>';
  const p = new URLSearchParams({years: years.join(',')});
  if (entityId) p.set('entity_id', entityId);
  const r = await fetch(P+'/api/reports/yoy?'+p).then(r=>r.json()).catch(()=>({error:'request failed'}));
  if (r.error) { resEl.innerHTML = `<div class="empty" style="padding:30px;color:#d32f2f;text-align:center">Error: ${esc(r.error)}</div>`; return; }

  // Build a per-year summary table
  const cs = 'background:#fff;border:1px solid #e0e4ea;border-radius:10px;padding:16px 20px';
  const header = `<div style="display:grid;grid-template-columns:repeat(${r.per_year.length},1fr);gap:12px;margin-bottom:14px">`;
  const cards = r.per_year.map(y => {
    // Combined: take max per category to avoid double-counting when both sources report
    const income = Math.max(y.transactions.income, y.documents.income);
    const expense = Math.max(y.transactions.expense, y.documents.expense);
    const totalCount = y.transactions.count + y.documents.count;
    const net = income - expense;
    return `<div style="${cs}">
      <div style="font-size:1.1rem;font-weight:700;color:#1a3c5e;margin-bottom:10px">${esc(y.year)}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:#28a745;font-size:.82rem">Income</span><span style="font-weight:700;color:#28a745">$${fmt(income)}</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:#dc3545;font-size:.82rem">Expenses</span><span style="font-weight:700;color:#dc3545">$${fmt(expense)}</span></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid #e0e4ea;padding-top:6px;margin-top:6px"><span style="font-size:.82rem;color:var(--muted)">Net</span><span style="font-weight:700;color:${net>=0?'#28a745':'#dc3545'}">${net<0?'-':''}$${fmt(Math.abs(net))}</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:.74rem;color:var(--muted)"><span>${y.transactions.count} txns + ${y.documents.count} docs</span><span>${totalCount}</span></div>
    </div>`;
  }).join('');

  // Deltas row
  let deltasHtml = '';
  if (r.deltas && r.deltas.length) {
    deltasHtml = `<div style="background:#f8f9fb;border:1px solid #e0e4ea;border-radius:10px;padding:14px 18px;margin-bottom:14px">
      <div style="font-weight:700;font-size:.9rem;color:#1a3c5e;margin-bottom:10px">Year-over-Year Change</div>
      ${r.deltas.map(d => {
        const pctFmt = (v) => v === null ? '—' : (v === Infinity ? '∞' : (v>=0?'+':'')+v+'%');
        const incColor = d.income_change >= 0 ? '#28a745' : '#dc3545';
        const expColor = d.expense_change >= 0 ? '#dc3545' : '#28a745';  // expense UP is red
        return `<div style="display:flex;gap:20px;font-size:.85rem;margin-bottom:6px">
          <span style="font-weight:600;color:#1a3c5e;min-width:140px">${esc(d.prev_year)} → ${esc(d.current_year)}</span>
          <span>Income: <strong style="color:${incColor}">${d.income_change>=0?'+':''}$${fmt(Math.abs(d.income_change))}</strong> <span style="color:var(--muted)">(${pctFmt(d.income_change_pct)})</span></span>
          <span>Expenses: <strong style="color:${expColor}">${d.expense_change>=0?'+':''}$${fmt(Math.abs(d.expense_change))}</strong> <span style="color:var(--muted)">(${pctFmt(d.expense_change_pct)})</span></span>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Top expense vendors per year
  const vendorCols = years.map(y => {
    const list = (r.top_expense_vendors[y] || []).slice(0, 10);
    return `<div style="${cs}">
      <div style="font-weight:700;color:#1a3c5e;margin-bottom:10px;font-size:.95rem">${esc(y)} · Top Expenses</div>
      ${list.length ? list.map((v,i) => `<div style="display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;border-bottom:1px solid #f0f2f5">
        <span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(v.vendor)}">${i+1}. ${esc(v.vendor)}</span>
        <span style="font-weight:600;color:#dc3545">$${fmt(v.total)}</span>
      </div>`).join('') : '<div style="font-size:.82rem;color:var(--muted)">No data</div>'}
    </div>`;
  }).join('');

  resEl.innerHTML = `${header}${cards}</div>
    ${deltasHtml}
    <div style="display:grid;grid-template-columns:repeat(${years.length},1fr);gap:12px">${vendorCols}</div>`;
}

function downloadYoYCsv() {
  const yearsRaw = (document.getElementById('yoy-years')?.value || '').trim();
  const years = yearsRaw.split(/[\s,]+/).filter(Boolean);
  const entityId = document.getElementById('yoy-entity')?.value || '';
  if (years.length < 2) { alert('Enter at least 2 years.'); return; }
  const p = new URLSearchParams({years: years.join(',')});
  if (entityId) p.set('entity_id', entityId);
  // Client-side CSV synthesis from the existing JSON endpoint — no new route needed
  fetch(P+'/api/reports/yoy?'+p).then(r=>r.json()).then(data => {
    if (data.error) { alert(data.error); return; }
    const lines = ['year,income,expense,net,count'];
    data.per_year.forEach(y => {
      const d = y.transactions.count > 0 ? y.transactions : y.documents;
      lines.push([y.year, d.income, d.expense, (d.income - d.expense).toFixed(2), d.count].join(','));
    });
    const csv = lines.join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `yoy_${years.join('_')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

/* ───── Mileage log ───── */
async function loadMileage() {
  const p = new URLSearchParams({limit:1000});
  const e = document.getElementById('mf-entity')?.value; if(e) p.set('entity_id',e);
  const y = document.getElementById('mf-year')?.value;   if(y) p.set('year',y);
  if (document.getElementById('mf-business-only')?.checked) p.set('business_only','1');
  const d = await fetch(P+'/api/mileage?'+p).then(r=>r.json()).catch(()=>({entries:[],summary:{}}));

  // Summary cards
  const s = d.summary || {};
  const summaryEl = document.getElementById('mil-summary');
  if (summaryEl) {
    const total = (s.total_miles || 0).toFixed(1);
    const biz   = (s.business_miles || 0).toFixed(1);
    const pers  = (s.personal_miles || 0).toFixed(1);
    const ded   = (s.deduction_amount || 0).toFixed(2);
    const rate  = s.rate ? `$${s.rate.toFixed(3)}/mi` : 'IRS default';
    const yr    = document.getElementById('mf-year')?.value || 'all years';
    const cs = 'background:#fff;border:1px solid #e0e4ea;border-radius:10px;padding:14px 18px;text-align:center';
    const ls = 'font-size:.72rem;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em';
    const vs = 'font-size:1.4rem;font-weight:700';
    summaryEl.innerHTML = `
      <div style="${cs}"><div style="${ls}">Business Miles</div><div style="${vs};color:#28a745">${biz}</div></div>
      <div style="${cs}"><div style="${ls}">Personal Miles</div><div style="${vs};color:#6c757d">${pers}</div></div>
      <div style="${cs}"><div style="${ls}">Total Miles</div><div style="${vs}">${total}</div></div>
      <div style="${cs}"><div style="${ls}">Deduction (${esc(yr)})</div><div style="${vs};color:#6f42c1">$${ded}</div></div>
      <div style="${cs}"><div style="${ls}">Rate</div><div style="${vs};font-size:1rem;color:var(--muted)">${esc(rate)}</div></div>
      <div style="${cs}"><div style="${ls}">Entries</div><div style="${vs}">${s.count || 0}</div></div>
    `;
  }

  // Row list
  const tbody = document.getElementById('mileage-body');
  if (!tbody) return;
  const rows = d.entries || [];
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--muted)">No mileage logged yet. Click "+ Add Entry" to start.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const miles = parseFloat(r.miles || 0);
    const rate  = parseFloat(r.rate_per_mile || 0);
    const ded   = r.business ? (miles * rate).toFixed(2) : '—';
    const route = (r.from_location || r.to_location)
      ? `${esc(r.from_location || '?')} → ${esc(r.to_location || '?')}` : '';
    return `<tr>
      <td style="white-space:nowrap">${esc((r.date||'').slice(0,10))}</td>
      <td style="text-align:right">${miles.toFixed(1)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.purpose||'')}">${esc(r.purpose||'')}</td>
      <td style="font-size:.78rem;color:var(--muted)">${route}</td>
      <td>${esc(r.vehicle||'')}</td>
      <td>${r.business ? '<span class="badge badge-income">business</span>' : '<span class="badge badge-other">personal</span>'}</td>
      <td style="text-align:right;font-size:.78rem">$${rate.toFixed(3)}</td>
      <td style="text-align:right;font-weight:600;color:${r.business?'#6f42c1':'#aaa'}">${r.business?'$'+ded:'—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm btn-outline" onclick="editMileage(${r.id})">Edit</button>
        <button class="btn btn-sm btn-outline" onclick="deleteMileageEntry(${r.id})" style="color:#c0392b;border-color:#e6a8a1">&#128465;</button>
      </td>
    </tr>`;
  }).join('');
}

function openMileageForm(entry) {
  document.getElementById('mil-id').value = entry?.id || '';
  document.getElementById('mil-form-title').textContent = entry ? 'Edit Mileage Entry' : 'Add Mileage Entry';
  document.getElementById('mil-date').value = entry?.date?.slice(0,10) || new Date().toISOString().slice(0,10);
  document.getElementById('mil-miles').value = entry?.miles ?? '';
  document.getElementById('mil-entity').value = entry?.entity_id ?? '';
  document.getElementById('mil-vehicle').value = entry?.vehicle || '';
  document.getElementById('mil-purpose').value = entry?.purpose || '';
  document.getElementById('mil-from').value = entry?.from_location || '';
  document.getElementById('mil-to').value = entry?.to_location || '';
  document.getElementById('mil-odo-start').value = entry?.odometer_start ?? '';
  document.getElementById('mil-odo-end').value = entry?.odometer_end ?? '';
  document.getElementById('mil-rate').value = entry?.rate_per_mile ?? '';
  document.getElementById('mil-business').checked = entry ? !!entry.business : true;
  document.getElementById('mil-notes').value = entry?.notes || '';
  const modal = document.getElementById('mileage-modal');
  modal.style.display = 'flex';
}

function closeMileageForm() {
  document.getElementById('mileage-modal').style.display = 'none';
}

async function editMileage(id) {
  const r = await fetch(P+'/api/mileage/'+id).then(r=>r.json()).catch(()=>null);
  if (!r || r.error) { alert('Could not load entry'); return; }
  openMileageForm(r);
}

async function saveMileageEntry() {
  const id = document.getElementById('mil-id').value;
  const payload = {
    date: document.getElementById('mil-date').value,
    miles: parseFloat(document.getElementById('mil-miles').value) || 0,
    entity_id: document.getElementById('mil-entity').value || null,
    vehicle: document.getElementById('mil-vehicle').value.trim(),
    purpose: document.getElementById('mil-purpose').value.trim(),
    from_location: document.getElementById('mil-from').value.trim(),
    to_location: document.getElementById('mil-to').value.trim(),
    odometer_start: document.getElementById('mil-odo-start').value || null,
    odometer_end: document.getElementById('mil-odo-end').value || null,
    rate_per_mile: document.getElementById('mil-rate').value || null,
    business: document.getElementById('mil-business').checked,
    notes: document.getElementById('mil-notes').value.trim(),
  };
  if (!payload.date || !payload.miles || payload.miles <= 0) {
    alert('Date and a positive miles value are required.');
    return;
  }
  const btn = document.getElementById('mil-save-btn');
  btn.disabled = true;
  let r;
  if (id) {
    r = await post('/api/mileage/'+id, payload);
    if (r.updated) { toast('Entry updated', 'success'); closeMileageForm(); loadMileage(); }
    else { alert(r.error || 'Update failed'); }
  } else {
    r = await post('/api/mileage', payload);
    if (r.status === 'created') { toast('Entry added', 'success'); closeMileageForm(); loadMileage(); }
    else { alert(r.error || 'Save failed'); }
  }
  btn.disabled = false;
}

async function deleteMileageEntry(id) {
  if (!confirm('Delete this mileage entry?')) return;
  const r = await fetch(P+'/api/mileage/'+id, {method:'DELETE'}).then(r=>r.json()).catch(()=>({}));
  if (r.deleted) { toast('Entry deleted', 'success'); loadMileage(); }
  else { alert(r.error || 'Delete failed'); }
}

function exportMileageCSV() {
  const p = new URLSearchParams();
  const e = document.getElementById('mf-entity')?.value; if(e) p.set('entity_id',e);
  const y = document.getElementById('mf-year')?.value;   if(y) p.set('year',y);
  window.location = P+'/api/mileage/export.csv' + (p.toString() ? '?'+p : '');
}

/* ───── Activity log filter view ───── */
let _actOffset = 0;
const _actPageSize = 100;
let _actTotal = 0;
let _actDebounceTimer = null;

function debouncedLoadActivity() {
  clearTimeout(_actDebounceTimer);
  _actDebounceTimer = setTimeout(() => { _actOffset = 0; loadActivity(); }, 300);
}

async function loadActivity() {
  await Promise.all([_ensureActionOptions(), _ensureUserOptions()]);
  const p = new URLSearchParams();
  const s = document.getElementById('act-search')?.value.trim();
  const a = document.getElementById('act-action')?.value;
  const u = document.getElementById('act-user')?.value;
  const since = document.getElementById('act-since')?.value;
  const until = document.getElementById('act-until')?.value;
  if (s) p.set('search', s);
  if (a) p.set('action', a);
  if (u) p.set('user_id', u);
  if (since) p.set('since', since);
  if (until) p.set('until', until);
  p.set('limit', _actPageSize);
  p.set('offset', _actOffset);

  const body = document.getElementById('act-body');
  body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--muted)"><div class="spinner"></div></td></tr>';

  const r = await fetch(P+'/api/activity?'+p).then(r=>r.json()).catch(()=>({rows:[],total:0}));
  // Endpoint returns a flat list if no filters; a {rows,total} if filtered
  const rows = Array.isArray(r) ? r : (r.rows || []);
  _actTotal = Array.isArray(r) ? rows.length : (r.total || 0);

  const countEl = document.getElementById('act-count');
  if (countEl) {
    const from = _actOffset + (rows.length ? 1 : 0);
    const to = _actOffset + rows.length;
    countEl.textContent = `${from.toLocaleString()}–${to.toLocaleString()} of ${_actTotal.toLocaleString()}`;
  }
  const pageLabel = document.getElementById('act-page-label');
  if (pageLabel) pageLabel.textContent = `Page ${Math.floor(_actOffset/_actPageSize)+1} of ${Math.max(1, Math.ceil(_actTotal/_actPageSize))}`;
  const prevBtn = document.getElementById('act-prev-btn');
  const nextBtn = document.getElementById('act-next-btn');
  if (prevBtn) prevBtn.disabled = _actOffset === 0;
  if (nextBtn) nextBtn.disabled = _actOffset + rows.length >= _actTotal;

  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--muted)">No activity matches the filters.</td></tr>';
    return;
  }
  body.innerHTML = rows.map(a => `<tr>
    <td style="white-space:nowrap;font-size:.78rem;color:var(--muted)">${esc((a.created_at||'').slice(0,19).replace('T',' '))}</td>
    <td style="white-space:nowrap"><span class="tag" style="font-size:.76rem">${esc(a.action||'')}</span></td>
    <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis" title="${esc(a.detail||'')}">${esc(a.detail||'')}</td>
    <td>${esc(a.username||'—')}</td>
    <td>${esc(a.entity_name||'')}</td>
  </tr>`).join('');
}

async function _ensureActionOptions() {
  const sel = document.getElementById('act-action');
  if (!sel || sel.dataset.loaded) return;
  const opts = await fetch(P+'/api/activity/actions').then(r=>r.json()).catch(()=>[]);
  (opts || []).forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.action;
    opt.textContent = `${o.action} (${o.count.toLocaleString()})`;
    sel.appendChild(opt);
  });
  sel.dataset.loaded = '1';
}

async function _ensureUserOptions() {
  const sel = document.getElementById('act-user');
  if (!sel || sel.dataset.loaded) return;
  const users = await fetch(P+'/api/users').then(r=>r.json()).catch(()=>[]);
  (users || []).forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.username;
    sel.appendChild(opt);
  });
  sel.dataset.loaded = '1';
}

function clearActivityFilters() {
  ['act-search','act-action','act-user','act-since','act-until'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  _actOffset = 0;
  loadActivity();
}

function actPagePrev() {
  if (_actOffset === 0) return;
  _actOffset = Math.max(0, _actOffset - _actPageSize);
  loadActivity();
}
function actPageNext() {
  if (_actOffset + _actPageSize >= _actTotal) return;
  _actOffset += _actPageSize;
  loadActivity();
}
</script>
