  <div id="ip-merrick" class="imp-panel">
    <div class="two-col">
      <div class="card">
        <div class="card-title" style="color:#2e5c8a">&#127968; Merrick Bank</div>
        <div id="mrk-status-badge" style="margin-bottom:10px;font-size:.82rem">Checking…</div>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">
          Traditional ASP.NET login portal — simpler to automate than Capital One.
          Downloads CSV transaction exports. MFA via SMS OTP.
        </p>
        <div class="form-group">
          <label>Username</label>
          <input id="mrk-username" class="form-control" type="text" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input id="mrk-password" class="form-control" type="password" autocomplete="new-password">
            <span class="pw-eye" onclick="togglePw('mrk-password',this)" title="Show/hide">&#128065;</span>
          </div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="saveMrkCreds()">Save Credentials</button>
        <hr style="margin:16px 0;border-color:var(--border)">
        <div style="font-weight:600;font-size:.85rem;margin-bottom:6px">&#127850; Cookie Auth</div>
        <div id="mrk-cookie-status" style="margin-bottom:8px;font-size:.8rem;color:var(--muted)"></div>
        <div class="form-group">
          <textarea id="mrk-cookies-input" class="form-control" rows="3" style="font-family:monospace;font-size:.72rem" placeholder='[{"name":"...","value":"...","domain":"merrickbank.com",...}]'></textarea>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="saveMrkCookies()">&#128190; Save Cookies</button>
          <button class="btn btn-outline btn-sm" onclick="clearMrkCookies()" style="color:#d32f2f">&#128465; Clear</button>
        </div>
        <div id="mrk-cookie-result" style="margin-top:6px;font-size:.8rem"></div>
      </div>
      <div class="card">
        <div class="card-title">Download Transactions</div>
        <div class="form-row">
          <div class="form-group">
            <label>Entity</label>
            <select id="mrk-entity" class="form-control">
              {% for e in entities %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Years</label>
            <input id="mrk-years-input" class="form-control" type="text" value="2022,2023,2024,2025">
          </div>
        </div>
        <button class="btn btn-primary" id="mrk-start-btn" onclick="startMrkImport()">&#9654; Download Transactions</button>
        <div id="mrk-mfa-box" style="display:none;margin-top:12px;background:#fff8e1;border-left:3px solid #ffc107;padding:10px 14px;border-radius:0 4px 4px 0">
          <strong style="font-size:.85rem">&#128274; MFA Required</strong>
          <p style="font-size:.82rem;margin:4px 0 8px">Check your phone for a code from Merrick Bank.</p>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="mrk-mfa-code" class="form-control" type="text" placeholder="6-digit code" style="max-width:160px;font-family:monospace;letter-spacing:.1em">
            <button class="btn btn-primary btn-sm" onclick="submitMrkMfa()">Submit</button>
          </div>
        </div>
      </div>
    </div>
    <div id="mrk-log-panel" style="display:none;margin-top:12px">
      <div class="card" style="padding:0;overflow:hidden">
        <div style="background:#2e5c8a;color:#b3d9f7;padding:8px 14px;font-size:.75rem;font-weight:600;display:flex;justify-content:space-between;align-items:center">
          <span>&#128196; Merrick Bank Import Log — <span id="mrk-log-status">running</span></span>
          <button onclick="document.getElementById('mrk-log-panel').style.display='none'" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem">&times;</button>
        </div>
        <div id="mrk-log-lines" style="background:#0d1117;color:#c9d1d9;font-family:monospace;font-size:.75rem;line-height:1.6;padding:10px 14px;height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word"></div>
      </div>
    </div>
  </div>

  <!-- Chime Playwright Importer -->
