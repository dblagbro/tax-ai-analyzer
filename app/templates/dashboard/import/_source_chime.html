  <div id="ip-chime" class="imp-panel">
    <div class="two-col">
      <div class="card">
        <div class="card-title" style="color:#00c08b">&#128178; Chime Credentials</div>
        <div id="chm-status" style="font-size:.82rem;color:var(--muted);margin-bottom:10px">Checking…</div>
        <div class="form-group">
          <label>Email</label>
          <input id="chm-email" class="form-control" type="email" autocomplete="off" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="chm-password" class="form-control" type="password" autocomplete="new-password" placeholder="Chime password">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          <button class="btn btn-primary btn-sm" onclick="window.chmSaveCreds()">&#128274; Save Credentials</button>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px">
          <div style="font-size:.78rem;font-weight:600;color:#555;margin-bottom:6px">Cookie Injection (optional)</div>
          <textarea id="chm-cookies" class="form-control" rows="2" style="font-family:monospace;font-size:.74rem" placeholder='[{"name":"session","value":"abc","domain":".chime.com"}]'></textarea>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button class="btn btn-outline btn-sm" onclick="window.chmSaveCookies()">&#128190; Save Cookies</button>
            <button class="btn btn-outline btn-sm" onclick="window.chmClearCookies()">&#128465; Clear</button>
          </div>
        </div>
        <div id="chm-mfa-box" style="display:none;margin-top:10px;background:#fff3cd;border:1px solid #ffca28;border-radius:7px;padding:12px">
          <div style="font-weight:600;font-size:.84rem;margin-bottom:6px">&#128241; MFA Code Required</div>
          <div style="font-size:.79rem;color:#555;margin-bottom:8px">Enter the code Chime texted you:</div>
          <div style="display:flex;gap:6px">
            <input id="chm-mfa-code" class="form-control" type="tel" maxlength="6" placeholder="123456" style="max-width:120px">
            <button class="btn btn-primary btn-sm" onclick="window.chmSubmitMfa()">Submit</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Run Chime Import</div>
        <div class="form-row">
          <div class="form-group">
            <label>Entity</label>
            <select id="chm-entity" class="form-control">
              {% for e in entities %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Years</label>
            <input id="chm-years-input" class="form-control" type="text" value="2022,2023,2024,2025">
          </div>
        </div>
        <button class="btn btn-primary" id="chm-start-btn" onclick="window.startChime()">&#9654; Start Import</button>
        <p style="font-size:.79rem;color:var(--muted);margin-top:8px">
          Uses Playwright browser automation to log in and export transactions.
          MFA code prompt appears below if 2FA is required.
        </p>
      </div>
    </div>
    <div id="chm-log-panel" style="display:none;margin-top:12px">
      <div class="card" style="padding:0;overflow:hidden">
        <div style="background:#00704a;color:#b2dfdb;padding:8px 14px;font-size:.75rem;font-weight:600;display:flex;justify-content:space-between;align-items:center">
          <span>&#128196; Chime Import Log — <span id="chm-log-status">running</span></span>
          <button onclick="document.getElementById('chm-log-panel').style.display='none'" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem">&times;</button>
        </div>
        <div id="chm-log-lines" style="background:#0d1117;color:#c9d1d9;font-family:monospace;font-size:.75rem;line-height:1.6;padding:10px 14px;height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word"></div>
      </div>
    </div>
  </div>

  <!-- Verizon Playwright Importer -->
