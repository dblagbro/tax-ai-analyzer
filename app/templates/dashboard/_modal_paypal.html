<!-- PayPal Setup Modal -->
<div class="modal-overlay" id="mPaypalSetup">
  <div class="modal modal-xl">
    <div class="gm-modal-hdr" style="background:#003087">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:1.2rem">&#128172;</span>
        <h3>PayPal Setup &mdash; API Credentials Guide</h3>
      </div>
      <button class="gm-modal-close" onclick="closeM('mPaypalSetup')" title="Close">&times;</button>
    </div>
    <div id="pp-chat-msgs" class="gm-chat-msgs">
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:.88rem" id="pp-chat-init">
        <span class="loader"></span>&nbsp;Initializing assistant…
      </div>
    </div>
    <div class="gm-quick-acts">
      <span style="color:var(--muted)">Quick:</span>
      <button class="btn btn-secondary btn-sm" onclick="ppSendQuick('I have a PayPal Developer account already')">Already have an account</button>
      <button class="btn btn-secondary btn-sm" onclick="ppSendQuick('I need to create a PayPal Developer account first')">New to PayPal Dev</button>
      <button class="btn btn-secondary btn-sm" onclick="ppSendQuick('What is the difference between sandbox and live?')">Sandbox vs Live?</button>
      <button class="btn btn-secondary btn-sm" onclick="ppResetChat()" style="margin-left:auto">&#8635; Restart</button>
    </div>
    <div class="gm-input-area">
      <textarea id="pp-chat-input" placeholder="Ask a question or describe what you see…" rows="1" onkeydown="ppInputKeydown(event)"></textarea>
      <button class="btn btn-primary" id="pp-send-btn" onclick="ppSendMessage()">Send</button>
    </div>
  </div>
</div>
