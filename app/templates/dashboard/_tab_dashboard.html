<!-- DASHBOARD -->
<div id="tab-dashboard" class="tab-panel {% if active_tab == 'dashboard' or not active_tab %}active{% endif %}">
  <div class="page-header">
    <div><div class="page-title">Dashboard</div><div class="page-sub">Financial overview</div></div>
    <button class="btn btn-primary" onclick="triggerAnalysis()">
      <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
      Analyze Docs
    </button>
  </div>
  <div class="stat-grid">
    <div class="stat-card" onclick="sw('documents')" title="View all documents" style="cursor:pointer" onmouseover="this.style.boxShadow='0 4px 16px rgba(26,60,94,.2)'" onmouseout="this.style.boxShadow=''">
      <div class="stat-icon" style="background:#1a3c5e"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg></div>
      <div><div class="stat-num" id="s-docs">—</div><div class="stat-lbl">Total Documents <span style="font-size:.7rem;color:#1a3c5e">&#8594; view</span></div></div>
    </div>
    <div class="stat-card" onclick="jumpToTxns('income')" title="View income transactions" style="cursor:pointer" onmouseover="this.style.boxShadow='0 4px 16px rgba(40,167,69,.2)'" onmouseout="this.style.boxShadow=''">
      <div class="stat-icon" style="background:#28a745"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>
      <div><div class="stat-num pos" id="s-income">—</div><div class="stat-lbl">Total Income <span style="font-size:.7rem;color:#28a745">&#8594; view</span></div></div>
    </div>
    <div class="stat-card" onclick="jumpToTxns('expense')" title="View expense transactions" style="cursor:pointer" onmouseover="this.style.boxShadow='0 4px 16px rgba(220,53,69,.2)'" onmouseout="this.style.boxShadow=''">
      <div class="stat-icon" style="background:#dc3545"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
      <div><div class="stat-num neg" id="s-expenses">—</div><div class="stat-lbl">Total Expenses <span style="font-size:.7rem;color:#dc3545">&#8594; view</span></div></div>
    </div>
    <div class="stat-card" onclick="jumpToTxns('')" title="View all transactions" style="cursor:pointer" onmouseover="this.style.boxShadow='0 4px 16px rgba(111,66,193,.2)'" onmouseout="this.style.boxShadow=''">
      <div class="stat-icon" style="background:#6f42c1"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-7-2l5-5-1.41-1.41L12 14.17l-2.59-2.58L8 13z"/></svg></div>
      <div><div class="stat-num" id="s-net">—</div><div class="stat-lbl">Net Income / Loss <span style="font-size:.7rem;color:#6f42c1">&#8594; view</span></div></div>
    </div>
  </div>
  <div class="two-col">
    <div class="card"><div class="card-title">Entities</div><div class="entity-grid" id="entityGrid"><div class="empty"><div class="spinner"></div></div></div></div>
    <div class="card"><div class="card-title">Recent Activity</div><div class="act-list" id="actList"><div class="empty"><div class="spinner"></div></div></div></div>
  </div>
  <br>
  <div class="card"><div class="card-title">Recent Import Jobs</div><div id="recentJobs"><div class="empty"><div class="spinner"></div></div></div></div>
  <br>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">Filed Tax Returns</div>
      <button class="btn btn-sm btn-outline" onclick="openFiledReturnModal()">&#43; Add / Update</button>
    </div>
    <div id="filed-returns-table">
      <div class="empty" style="padding:16px;font-size:.85rem">No filed return data. <a href="#" onclick="openFiledReturnModal();return false">Add filed return numbers</a> to compare against analyzed data.</div>
    </div>
  </div>
</div>
