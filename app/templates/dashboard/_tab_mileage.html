<!-- MILEAGE -->
<div id="tab-mileage" class="tab-panel {% if active_tab == 'mileage' %}active{% endif %}">
  <div class="page-header">
    <div>
      <div class="page-title">Mileage Log</div>
      <div class="page-sub">Business miles for tax deduction at the IRS standard rate</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="exportMileageCSV()">&#128196; Export CSV</button>
      <button class="btn btn-primary" onclick="openMileageForm()">+ Add Entry</button>
    </div>
  </div>

  <!-- Summary cards -->
  <div id="mil-summary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px"></div>

  <!-- Filters -->
  <div class="filter-bar">
    <select id="mf-entity" class="form-control" onchange="loadMileage()">
      <option value="">All Entities</option>
      {% for e in entities %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}
    </select>
    <select id="mf-year" class="form-control" onchange="loadMileage()">
      <option value="">All Years</option>
      {% for y in tax_years %}<option value="{{ y }}">{{ y }}</option>{% endfor %}
    </select>
    <label style="display:flex;align-items:center;gap:6px;font-size:.84rem;padding:0 8px">
      <input id="mf-business-only" type="checkbox" onchange="loadMileage()"> Business only
    </label>
  </div>

  <!-- Entry table -->
  <div class="card">
    <div class="tbl-wrap">
      <table id="mileage-table" style="width:100%;font-size:.84rem">
        <thead><tr>
          <th>Date</th><th>Miles</th><th>Purpose</th><th>Route</th>
          <th>Vehicle</th><th>Business?</th><th>Rate</th><th>Deduction</th><th></th>
        </tr></thead>
        <tbody id="mileage-body"><tr><td colspan="9" style="text-align:center;padding:20px;color:var(--muted)">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Add/Edit form modal -->
  <div id="mileage-modal" class="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:10px;padding:24px;max-width:560px;width:92%;max-height:86vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.2)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-weight:700;font-size:1.05rem" id="mil-form-title">Add Mileage Entry</div>
        <button onclick="closeMileageForm()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#888">&times;</button>
      </div>
      <input id="mil-id" type="hidden">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>Date *</label>
          <input id="mil-date" type="date" class="form-control" required>
        </div>
        <div class="form-group" style="flex:1">
          <label>Miles *</label>
          <input id="mil-miles" type="number" class="form-control" step="0.1" min="0" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>Entity</label>
          <select id="mil-entity" class="form-control">
            <option value="">(none)</option>
            {% for e in entities %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group" style="flex:1">
          <label>Vehicle</label>
          <input id="mil-vehicle" type="text" class="form-control" placeholder="2023 Toyota Tacoma">
        </div>
      </div>
      <div class="form-group">
        <label>Purpose</label>
        <input id="mil-purpose" type="text" class="form-control" placeholder="Client meeting / Site visit / Supplies pickup">
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>From</label>
          <input id="mil-from" type="text" class="form-control" placeholder="Office">
        </div>
        <div class="form-group" style="flex:1">
          <label>To</label>
          <input id="mil-to" type="text" class="form-control" placeholder="Client site">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>Odometer Start</label>
          <input id="mil-odo-start" type="number" class="form-control" step="0.1" min="0">
        </div>
        <div class="form-group" style="flex:1">
          <label>Odometer End</label>
          <input id="mil-odo-end" type="number" class="form-control" step="0.1" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>Rate ($/mile) <span style="font-size:.72rem;color:var(--muted)">(blank = IRS default)</span></label>
          <input id="mil-rate" type="number" class="form-control" step="0.001" min="0" placeholder="0.670">
        </div>
        <div class="form-group" style="flex:1;display:flex;align-items:center;padding-top:24px">
          <label style="display:flex;align-items:center;gap:8px;font-weight:400">
            <input id="mil-business" type="checkbox" checked> Business use (tax-deductible)
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="mil-notes" class="form-control" rows="2" placeholder="Optional notes"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">
        <button class="btn btn-outline" onclick="closeMileageForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveMileageEntry()" id="mil-save-btn">Save Entry</button>
      </div>
    </div>
  </div>
</div>
