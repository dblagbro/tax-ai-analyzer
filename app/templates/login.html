<!DOCTYPE html>
<html>
<head>
<title>Login — Financial AI Analyzer</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-card { background: white; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  .logo { text-align: center; margin-bottom: 30px; }
  .logo h1 { margin: 0; font-size: 1.4rem; color: #1a3c5e; }
  .logo p { margin: 6px 0 0; color: #666; font-size: 0.9rem; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 4px; }
  input[type=text], input[type=password] { width: 100%; padding: 10px 14px; border: 1px solid #ced4da; border-radius: 6px; font-size: 0.95rem; margin-bottom: 16px; }
  input:focus { outline: none; border-color: #1a3c5e; box-shadow: 0 0 0 2px rgba(26,60,94,0.15); }
  button { width: 100%; padding: 12px; background: #1a3c5e; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
  button:hover { background: #2a5c8e; }
  .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; }
  .remember { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 0.9rem; }
  .remember input { width: auto; margin: 0; padding: 0; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>Financial AI Analyzer</h1>
    <p>Tax document management &amp; bookkeeping</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="{{ url_prefix }}/login">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <div class="remember">
      <input type="checkbox" id="remember" name="remember">
      <label for="remember" style="font-weight:normal">Remember me</label>
    </div>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
